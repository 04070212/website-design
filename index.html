<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#2D1B3D">
<title>人生是旷野 — Su Su</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Noto+Serif+SC:wght@300;400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<!-- Three.js Import Map -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<style>
/* ================================================================
   RESET & BASE
   ================================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Inter','Noto Serif SC',serif}
body{background:#1a1025;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
button{font-family:inherit;border:none;cursor:pointer;background:none;color:inherit;font-size:inherit}

/* ================================================================
   LAYER 1: COVER PAGE — CSS City + Door
   ================================================================ */
#cover{
  position:fixed;inset:0;z-index:100;
  background:#0d0d1a;
  transition:opacity 1s ease,visibility 1s ease;
  overflow:hidden;
}
#cover.hidden{opacity:0;visibility:hidden;pointer-events:none}

/* City skyline — building rows */
.city-skyline{position:absolute;inset:0;z-index:1;pointer-events:none}
.city-buildings-row{
  position:absolute;left:-5%;right:-5%;display:flex;align-items:flex-end;justify-content:center;gap:0;
}
.city-buildings-row.row-back{bottom:28%;height:50%}
.city-buildings-row.row-front{bottom:22%;height:45%}
.city-building{
  flex:1;min-width:18px;max-width:80px;
  background:#151528;
  margin:0 1px;
}
.city-building.tall{background:#1a1a30}
.city-building.warm{background:#1a1520}
.city-building.lit{background:#1d1a2a}
/* Windows */
.city-building{position:relative}
.city-building::after{
  content:'';position:absolute;inset:4px;
  background-image:
    radial-gradient(circle at 30% 20%, #FFDD88 1px, transparent 1px),
    radial-gradient(circle at 70% 25%, #FFDD88 1.5px, transparent 1.5px),
    radial-gradient(circle at 50% 40%, #8899CC 1px, transparent 1px),
    radial-gradient(circle at 25% 55%, #FFDD88 1px, transparent 1px),
    radial-gradient(circle at 65% 60%, #8899CC 1.5px, transparent 1.5px),
    radial-gradient(circle at 40% 75%, #FFDD88 1px, transparent 1px),
    radial-gradient(circle at 75% 80%, #FFDD88 1px, transparent 1px),
    radial-gradient(circle at 20% 90%, #8899CC 1px, transparent 1px);
  animation:twinkle 3s ease-in-out infinite;
  animation-delay:var(--twinkle-delay, 0s);
}
@keyframes twinkle{
  0%,100%{opacity:0.45}
  50%{opacity:0.9}
}
.city-ground{
  position:absolute;bottom:0;left:0;right:0;height:25%;
  background:linear-gradient(180deg, #1a1a1a 0%, #111 100%);
}
/* Road markings */
.city-ground::before{
  content:'';position:absolute;top:30%;left:10%;right:10%;height:2px;
  background:repeating-linear-gradient(90deg, rgba(255,255,255,0.15) 0px, rgba(255,255,255,0.15) 20px, transparent 20px, transparent 40px);
}

/* Door scene */
.door-scene{
  position:absolute;bottom:20%;left:50%;transform:translateX(-50%);
  z-index:10;cursor:pointer;
  transition:transform 0.3s ease,filter 0.3s ease;
}
.door-scene:hover{transform:translateX(-50%) scale(1.04);filter:brightness(1.15)}
.door-scene:hover .door-glow{opacity:0.8}
.door-scene:active{transform:translateX(-50%) scale(0.98)}
.door-frame{
  position:relative;
  width:140px;height:240px;
  background:linear-gradient(180deg, #4A3020, #3A2518);
  border-radius:12px 12px 4px 4px;
  box-shadow:0 0 40px rgba(200,150,80,0.2), inset 0 0 20px rgba(0,0,0,0.3);
  display:flex;overflow:hidden;
}
.door-panel{
  flex:1;height:100%;
  background:linear-gradient(180deg, #6B4030, #5A3525);
  transition:transform 0.8s cubic-bezier(0.4,0,0.2,1);
  position:relative;
}
.door-panel::after{
  content:'';position:absolute;top:40%;width:6px;height:6px;
  background:#D4A860;border-radius:50%;
  box-shadow:0 0 8px rgba(212,168,96,0.6);
}
.door-left{border-right:1px solid #3A2018}
.door-left::after{right:8px}
.door-right{border-left:1px solid #3A2018}
.door-right::after{left:8px}
.door-left.open{transform:perspective(600px) rotateY(-65deg);transform-origin:left center}
.door-right.open{transform:perspective(600px) rotateY(65deg);transform-origin:right center}
.door-glow{
  position:absolute;inset:10%;z-index:-1;
  background:radial-gradient(ellipse, rgba(255,220,150,0.25) 0%, transparent 70%);
  transition:opacity 0.8s ease;
  opacity:0.5;
}

.door-label{
  position:fixed;bottom:6%;left:50%;transform:translateX(-50%);
  z-index:20;color:#FDF0D5;font-size:clamp(15px,2.5vw,20px);
  text-shadow:0 2px 10px rgba(0,0,0,0.6);
  pointer-events:none;letter-spacing:2px;
}

/* Music toggle button */
.music-toggle{
  position:fixed;top:24px;right:24px;z-index:110;
  width:42px;height:42px;border-radius:50%;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.15);
  color:#FDF0D5;font-size:20px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  transition:all 0.3s ease;
}
.music-toggle:hover{background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.3)}
.music-toggle.playing{background:rgba(255,220,150,0.15);border-color:rgba(255,220,150,0.35);box-shadow:0 0 16px rgba(255,220,150,0.15)}
.music-toggle.muted{opacity:0.5}

.city-overlay{
  position:fixed;inset:0;z-index:50;pointer-events:none;
  background:#FFFFFF;opacity:0;
  transition:opacity 0.8s ease;
}
.city-overlay.show{opacity:1}

@media(max-width:768px){
  .door-frame{width:110px;height:190px}
  .door-label{font-size:14px;bottom:8%}
}

/* ================================================================
   LAYER 2: 3D MAP PAGE
   ================================================================ */
#mapPage{
  position:fixed;inset:0;z-index:0;
}
#threeCanvas{width:100%;height:100%;display:block}

/* 2D UI Overlays */
.map-overlay{
  position:fixed;z-index:10;
  pointer-events:none;
  color:#FDF0D5;
  text-shadow:0 1px 8px rgba(0,0,0,0.4);
}
.map-overlay *{pointer-events:auto}

/* Top-left: title */
.map-title{
  top:28px;left:32px;
  font-family:'Noto Serif SC',serif;
  font-size:22px;font-weight:600;
  color:#3D2A1A;
  text-shadow:0 1px 3px rgba(255,255,255,0.5);
  opacity:0;transition:opacity 1s ease 1s;
}
.map-title.show{opacity:1}

/* Welcome banner — center → top-left fly */
.welcome-banner{
  position:fixed;z-index:80;pointer-events:none;
  top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Caveat',cursive;
  font-size:clamp(36px,7vw,72px);
  color:#FDF0D5;
  text-shadow:0 1px 4px rgba(0,0,0,0.08);
  opacity:0;
  transition:all 2s cubic-bezier(0.25,0.8,0.25,1.2);
}
.welcome-banner.fly{
  opacity:1;
  top:30px;left:34px;transform:translate(0,0);
  font-size:28px;
}

/* Top-right: hint */
.map-hint{
  top:58px;left:34px;
  font-family:'Noto Serif SC',serif;
  font-size:14px;color:#4A3525;opacity:0.85;
  text-align:left;line-height:1.8;
  text-shadow:0 1px 2px rgba(255,255,255,0.5);
}

/* Bottom-right: social */
.map-social{
  bottom:32px;right:32px;
  display:flex;gap:16px;align-items:center;
}
.map-social a{
  display:flex;align-items:center;justify-content:center;
  width:48px;height:48px;
  border-radius:50%;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.15);
  transition:transform 0.2s ease,background 0.2s ease;
  overflow:hidden;
}
.map-social a img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.map-social a:hover{
  transform:scale(1.1);
  background:rgba(255,255,255,0.18);
}

/* Character dialogue bubble */
#dialogueBubble{
  position:fixed;z-index:15;
  padding:12px 20px;
  border-radius:20px 20px 20px 4px;
  background:rgba(30,22,41,0.92);
  backdrop-filter:blur(12px);
  border:1px solid rgba(232,168,124,0.2);
  color:#FDF0D5;
  font-size:14px;
  max-width:260px;
  opacity:0;visibility:hidden;
  transform:translateY(8px);
  transition:opacity 0.25s ease,transform 0.25s ease;
  pointer-events:none;
}
#dialogueBubble.show{opacity:1;visibility:visible;transform:translateY(0)}
#dialogueBubble::after{
  content:'';position:absolute;
  bottom:-8px;left:20px;
  width:0;height:0;
  border-left:8px solid transparent;
  border-right:8px solid transparent;
  border-top:8px solid rgba(30,22,41,0.92);
}

/* ================================================================
   LAYER 3: MODAL
   ================================================================ */
#modalOverlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;visibility:hidden;
  transition:opacity 0.3s ease,visibility 0.3s ease;
}
#modalOverlay.show{opacity:1;visibility:visible}

#modalCard{
  max-width:700px;width:92%;
  background:rgba(30,22,41,0.75);
  border-radius:32px;
  padding:48px 40px;
  border:1px solid rgba(232,168,124,0.2);
  box-shadow:0 40px 80px rgba(0,0,0,0.5);
  color:#FDF0D5;
  transform:scale(0.8);
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  position:relative;
  max-height:88vh;overflow-y:auto;
}
#modalOverlay.show #modalCard{transform:scale(1)}

.modal-icon{font-size:56px;display:block;margin-bottom:16px}
.modal-title{font-family:'Noto Serif SC',serif;font-size:28px;font-weight:600;margin-bottom:10px}
.modal-tag{display:inline-block;padding:4px 14px;border-radius:20px;font-size:13px;background:rgba(196,132,252,0.15);color:#C084FC;margin-bottom:24px}
.modal-body{font-size:16px;line-height:2.0;opacity:0.92;white-space:pre-wrap}
.modal-body .highlight{color:#E8A87C;font-weight:500}
.body-link{color:#E8A87C;text-decoration:underline;text-underline-offset:3px;transition:color 0.2s}
.body-link:hover{color:#F5C896}

/* Tree hole (焦虑泥潭) */
.tree-hole{margin-top:28px;padding-top:24px;border-top:1px solid rgba(255,255,255,0.08)}
.tree-hole-label{font-size:15px;color:rgba(255,255,255,0.6);margin-bottom:14px}
.tree-hole-label span{font-size:18px;margin-right:6px}
.tree-hole textarea{
  width:100%;height:100px;padding:14px;border-radius:12px;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);
  color:#FDF0D5;font-size:14px;font-family:inherit;line-height:1.8;
  resize:vertical;outline:none;transition:border-color 0.3s;
}
.tree-hole textarea:focus{border-color:rgba(168,140,120,0.4)}
.tree-hole textarea::placeholder{color:rgba(255,255,255,0.25)}
.tree-hole-btn{
  margin-top:12px;padding:8px 24px;border-radius:20px;
  background:rgba(168,140,120,0.15);border:1px solid rgba(168,140,120,0.3);
  color:#C8B8A0;font-size:14px;cursor:pointer;
  transition:all 0.3s ease;
}
.tree-hole-btn:hover{background:rgba(168,140,120,0.25);color:#E8D8C0}
.tree-hole-response{display:none;margin-top:14px;font-size:14px;color:rgba(255,255,255,0.5);font-style:italic}
.tree-hole-response.show{display:block}

.modal-close{
  position:absolute;top:16px;right:20px;
  width:36px;height:36px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;color:#FDF0D5;opacity:0.5;
  transition:opacity 0.2s ease,transform 0.3s ease;
}
.modal-close:hover{opacity:1;transform:rotate(90deg)}

/* Tavern dice button */
.dice-btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:12px 28px;margin:16px 0;
  border-radius:28px;
  background:rgba(232,168,124,0.1);
  border:1px solid rgba(232,168,124,0.3);
  color:#E8A87C;
  font-size:15px;font-weight:500;
  cursor:pointer;
  transition:transform 0.2s ease,box-shadow 0.2s ease,background 0.2s ease;
}
.dice-btn:hover{
  transform:scale(1.05);
  background:rgba(232,168,124,0.18);
  box-shadow:0 0 24px rgba(232,168,124,0.2);
}
.song-result{margin-top:12px;padding:14px 18px;border-radius:16px;background:rgba(232,168,124,0.06);border:1px solid rgba(232,168,124,0.1);font-size:13px;line-height:1.6}

/* Workshop project links */
.workshop-links{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.workshop-link{
  display:block;padding:14px 18px;
  border-radius:16px;
  background:rgba(232,168,124,0.06);
  border:1px solid rgba(232,168,124,0.1);
  transition:background 0.2s ease,border-color 0.2s ease;
}
.workshop-link:hover{background:rgba(232,168,124,0.14);border-color:rgba(232,168,124,0.25)}
.workshop-link .wl-icon{font-size:20px;margin-right:8px}
.workshop-link .wl-name{font-size:14px;font-weight:600;color:#E8A87C}
.workshop-link .wl-desc{font-size:12px;opacity:0.6;margin-top:4px}

/* Scrollbar */
#modalCard::-webkit-scrollbar{width:4px}
#modalCard::-webkit-scrollbar-track{background:transparent}
#modalCard::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}

/* QR code overlay */
#qrOverlay{
  position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;
  opacity:0;visibility:hidden;
  transition:opacity 0.3s ease,visibility 0.3s ease;
  cursor:pointer;
}
#qrOverlay.show{opacity:1;visibility:visible}
#qrOverlay img{max-width:320px;max-height:70vh;border-radius:20px;box-shadow:0 8px 40px rgba(0,0,0,0.4)}
#qrOverlay .qr-title{color:#FDF0D5;font-size:18px;font-family:'Noto Serif SC',serif}
#qrOverlay .qr-hint{color:rgba(255,255,255,0.4);font-size:13px}

/* ================================================================
   RESPONSIVE
   ================================================================ */
@media(max-width:768px){
  #modalCard{padding:32px 22px;border-radius:24px;max-height:90vh}
  .modal-icon{font-size:40px}
  .modal-title{font-size:22px}
  .modal-body{font-size:14px}
  .map-hint{display:none}
  .map-social a{width:40px;height:40px}
  .map-social{bottom:20px;right:20px;gap:12px}
  .map-title{top:20px;left:20px;font-size:22px}
}

@media(max-width:480px){
  #modalCard{padding:24px 18px;border-radius:20px}
  .modal-body{font-size:13px;line-height:1.8}
}
</style>
</head>
<body>

<!-- ================================================================
     LAYER 1: COVER PAGE
     ================================================================ -->
<div id="cover">
  <div class="city-skyline">
    <div class="city-buildings-row row-back" id="buildingsBack"></div>
    <div class="city-buildings-row row-front" id="buildingsFront"></div>
    <div class="city-ground"></div>
  </div>
  <div class="door-scene" id="doorScene">
    <div class="door-frame">
      <div class="door-panel door-left" id="doorLeft"></div>
      <div class="door-panel door-right" id="doorRight"></div>
      <div class="door-glow"></div>
    </div>
  </div>
  <div class="door-label">🚪 推开这扇门，进入SuSu的旷野</div>
  <div class="city-overlay" id="cityOverlay"></div>
</div>

<!-- Music toggle — visible on both cover and map -->
<button class="music-toggle muted" id="musicToggle" title="音乐">🔇</button>

<!-- ================================================================
     LAYER 2: 3D MAP PAGE
     ================================================================ -->
<div id="mapPage">
  <canvas id="threeCanvas"></canvas>

  <!-- 2D UI Overlays -->
  <div class="map-overlay map-title" id="mapTitle"></div>
  <div class="welcome-banner" id="welcomeBanner">欢迎进入SuSu的旷野</div>
  <div class="map-overlay map-hint">拖拽旋转 · 滚轮缩放<br>点击地标查看故事</div>
  <div class="map-overlay map-social">
    <a href="#" class="qr-link" data-src="20260719-152932.jpg" data-title="小红书" title="小红书"><img src="xiaohongshu-icon.svg" alt="小红书"></a>
    <a href="#" class="qr-link" data-src="20260719-152937.jpg" data-title="抖音" title="抖音"><img src="douyin-icon.svg" alt="抖音"></a>
  </div>

  <!-- Character dialogue bubble -->
  <div id="dialogueBubble">欢迎来到我的旷野，随便逛逛。</div>
</div>

<!-- ================================================================
     LAYER 3: MODAL
     ================================================================ -->
<div id="modalOverlay">
  <div id="modalCard">
    <button class="modal-close" id="modalClose">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<!-- QR code overlay -->
<div id="qrOverlay" onclick="this.classList.remove('show')">
  <div class="qr-title" id="qrTitle"></div>
  <img id="qrImage" src="" alt="">
  <div class="qr-hint">点击任意处关闭</div>
</div>

<!-- ================================================================
     SCRIPTS
     ================================================================ -->
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ================================================================
// LANDMARK DATA
// ================================================================
const LANDMARKS = [
  { id:'main', icon:'🔥', title:'中央篝火', tag:'主城', position:[0,0,0],
    body:`Hello，我是Su Su，这里是我的旷野世界，我正在努力把我心中的旷野变成现实。本人INTP，想法很多，脚程很慢，属于不定期抽风发癫人类，至今也没有搞懂人类社会的运行规则。AI的诞生，像是给我配了一辆自行车，本女子目前也是酷酷为我的CC砸钱中，物质在降级，精神在越狱，我这不是落魄，这是我的"主动迷路"，希望看到这里的你也能拾起你内心的梦想，想干就干！` },
  { id:'experience', icon:'🏜️', title:'我走过的路', tag:null, position:[-8,0,-6],
    body:`阶段一：困在围墙里的观察者（大学时期）\n学的是人力资源管理，却赶上了一场全球性的锁闭。大学前两年，隔着屏幕看世界，隔着窗户看校园。直到大四彻底放开，才第一次真正"走出去"——毕业旅行去了云南，那是第一次闻到旷野的味道。但回来后，还是乖乖走进了HR的轨道。\n\n阶段二：坐在玻璃窗后面看别人的人生（工作两年）\n做了两年招聘，每天翻简历、面试、发offer。站在HR的窗口，看着无数人跳进跳出的轨迹，自己却像被钉在椅子上。中间试着做过自媒体，像在办公室里偷偷凿一扇窗，凿了几下又缩回去了。然后继续收心，继续面试别人，继续把自己的日子过成一张重复的表格。\n\n阶段三：跳进旷野，但腿还有点软（现在）\n终于受不了了。枯燥、重复、一眼望到头——这不是想要的生活。于是跳了出来，重新拾起自媒体，同时开始死磕AI。想法依然比行动多，但这次不一样了：AI成了加速器，让那些"不切实际"的念头，敢一个个扔进现实里试试。穷是真的穷，但每一天都是不一样的——哪怕是慌，也是新鲜的慌。` },
  { id:'workshop', icon:'⚒️', title:'正在勘探的道路', tag:null, position:[12,0,2],
    body:`目前同时在挖三座矿：\n\n第一座矿：短篇小说——把脑子里那些乱窜的念头，变成一个个有人物有呼吸的故事。还在练习让角色自己开口说话，而不是被推着走。\n\n第二座矿：自媒体——重新把曾经凿过几下的窗口凿开。这次不急着出结果，先让声音发出去，看看能遇见谁。\n\n第三座矿：AI网页 & 小程序——用AI做了独立的小工具、小页面、小程序。服务器在烧钱，但每一次部署成功，都像在旷野里立了一根新路标。\n\n👇 挖出来的成果（点击下方有惊喜哦）：`,

  { id:'dark', icon:'🌫️', title:'焦虑泥潭', tag:null, position:[-12,0,2],
    body:`毕业两年多，到今天，我也会不停的焦虑，人只要活着就是不停陷入新的泥潭里，我现在说好听叫"自由职业"，说难听叫"还没找工作的无业游民"。短期内靠兼职先撑着，把时间留给真正想做的事。\n\n最怕什么？怕折腾了一圈，什么都没有。怕想法烧完了，钱也烧完了，最后还是得灰溜溜回到格子间，假装这两年没发生过。\n\n但我也知道，这种怕，是旷野的标配。每个在没路的地方走路的人，脚下都踩着同一种心虚。我选择把它放在这里，不藏了。\n\n如果你也在类似的泥沼里，那这片寂静，我们不孤单。` },
  { id:'backpack', icon:'🎒', title:'旅人背囊', tag:null, position:[-10,0,8],

let eyeTargetX = 0, eyeTargetY = 0;
let mouseOnPage = false;

document.addEventListener('mousemove', (e) => {
  if (!mouseOnPage) return;
  eyeTargetX = (e.clientX / window.innerWidth) * 2 - 1;
  eyeTargetY = (e.clientY / window.innerHeight) * 2 - 1;
});
document.addEventListener('mouseleave', () => { mouseOnPage = false; eyeTargetX = 0; eyeTargetY = 0; });
document.addEventListener('mouseenter', () => { mouseOnPage = true; });
document.addEventListener('touchmove', (e) => {
  if (!e.touches[0]) return;
  eyeTargetX = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
  eyeTargetY = (e.touches[0].clientY / window.innerHeight) * 2 - 1;
  mouseOnPage = true;
}, { passive: true });
document.addEventListener('touchend', () => { mouseOnPage = false; eyeTargetX = 0; eyeTargetY = 0; });

function openModal(landmark) {
  let html = `<span class="modal-icon">${landmark.icon}</span><div class="modal-title">${landmark.title}</div>${landmark.tag ? `<span class="modal-tag">${landmark.tag}</span>` : ''}<div class="modal-body">${landmark.body.replace(/\n/g, '<br>')}</div>`;
  if (landmark.projects) {
    html += '<div class="workshop-links">';
    landmark.projects.forEach(p => {
      html += `<a class="workshop-link" href="${p.url}" target="_blank"><span class="wl-icon">${p.icon}</span><span class="wl-name">${p.name}</span><div class="wl-desc">${p.desc}</div></a>`;
    });
    html += '</div>';
  }
  if (landmark.isTavern) {
    html += `<p style="margin-top:20px;opacity:0.7;font-style:italic;font-size:14px">送你一首我最近在听的歌 🎵</p>`;
    html += `<button class="dice-btn" id="diceBtn">🎲 掷骰子</button><div class="song-result" id="songResult" style="display:none"></div>`;
  }
  if (landmark.id === 'dark') {
    html += `<div class="tree-hole">
      <div class="tree-hole-label"><span>🕳️</span>树洞倾听者</div>
      <textarea id="treeHoleInput" placeholder="把难过的事写在这里…没人会看到，写出来就让它沉进泥潭。"></textarea>
      <button class="tree-hole-btn" id="treeHoleBtn">扔进泥潭，沉掉它</button>
      <div class="tree-hole-response" id="treeHoleResponse"></div>
    </div>`;
  }
  modalContent.innerHTML = html;
  modalOverlay.classList.add('show');

  if (landmark.isTavern) {
    document.getElementById('diceBtn').addEventListener('click', () => {
      const song = landmark.songs[Math.floor(Math.random() * landmark.songs.length)];
      const el = document.getElementById('songResult');
      el.style.display = 'block';
      el.innerHTML = `🎵 <strong>${song.title}</strong><br><span style="opacity:0.7">${song.note}</span>`;
    });
  }

  if (landmark.id === 'dark') {
    const input = document.getElementById('treeHoleInput');
    const btn = document.getElementById('treeHoleBtn');
    const response = document.getElementById('treeHoleResponse');
    btn.addEventListener('click', () => {
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      input.disabled = true;
      btn.disabled = true;
      const replies = [
        '它沉进泥潭了。你看，还在冒泡呢…慢慢就没了。',
        '泥潭接住了。你轻一点了吗？',
        '好的坏的，都是你的一部分。但这一块，先寄存在这里吧。',
        '深呼吸。今天不容易，但你走到这里了。',
        '沉下去了。明天太阳照常升起，这片泥潭也会干一点。'
      ];
      response.textContent = replies[Math.floor(Math.random() * replies.length)];
      response.classList.add('show');
      setTimeout(() => {
        input.disabled = false;
        btn.disabled = false;
        response.classList.remove('show');
      }, 4000);
    });
  }
}

function closeModal() {
  modalOverlay.classList.remove('show');
  if (!charTarget || landmarkGroups.length === 0) return;
  tourIndex++;
  if (tourIndex < TOUR_ORDER.length) {
    const nextId = TOUR_ORDER[tourIndex];
    const nextGroup = landmarkGroups.find(g => g.userData.id === nextId);
    if (nextGroup) {
      const np = nextGroup.position.clone();
      charTarget.set(np.x + 1.5, 0, np.z - 1.5);
      followChar = true;
      // Hint after character arrives
      setTimeout(() => {
        const name = nextGroup.userData.landmarkData.title;
        if (showDialogue) showDialogue('👉 来看看：' + name, 8000);
      }, 2000);
    }
  } else {
    charTarget.set(0, 0, 0);
    followChar = true;
    setTimeout(() => {
      if (showDialogue) showDialogue('逛完啦！自己随便转转吧～', 6000);
    }, 2000);
  }
}
modalClose.addEventListener('click', closeModal);

function initThreeJS() {
  if (threeInitDone) return;
  threeInitDone = true;

  const isMobile = window.innerWidth < 768;
  const W = 60;

  // Scene
  const scene = new THREE.Scene();
  scene.background = new THREE.Color('#D6E4F0');
  scene.fog = new THREE.FogExp2('#D6E4F0', 0.0014);

  // Camera — 俯视
  camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.5, 120);
  camera.position.set(0, 24, 4);
  camera.lookAt(0, 0, 0);

  // Renderer
  const renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, antialias: true, alpha: false });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.25;

  // Lights — 清晨散射光
  scene.add(new THREE.AmbientLight('#D0DAEB', 0.6));
  const sun = new THREE.DirectionalLight('#FFFBF2', 1.4);
  sun.position.set(20, 25, 5);
  sun.castShadow = true;
  sun.shadow.mapSize.set(1024, 1024);
  sun.shadow.camera.near = 0.5; sun.shadow.camera.far = 80;
  sun.shadow.camera.left = -20; sun.shadow.camera.right = 20;
  sun.shadow.camera.top = 20; sun.shadow.camera.bottom = -20;
  sun.shadow.bias = -0.0004;
  scene.add(sun);
  scene.add(new THREE.HemisphereLight('#D0DCF0', '#5A6040', 0.35));

  // OrbitControls
  const controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 0.3, 0);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.3;
  controls.rotateSpeed = 0.35;
  controls.minDistance = 4;
  controls.maxDistance = 22;
  controls.maxPolarAngle = Math.PI * 0.4;
  controls.minPolarAngle = 0.3;
  controls.update();

  let iTimeout;
  const pauseAR = () => { controls.autoRotate = false; clearTimeout(iTimeout); iTimeout = setTimeout(() => { controls.autoRotate = true; }, 3000); };
  renderer.domElement.addEventListener('mousedown', pauseAR);
  renderer.domElement.addEventListener('touchstart', pauseAR, { passive: true });
  renderer.domElement.addEventListener('wheel', pauseAR);

  // Noise
  function hash(x, z) { let h = x * 374761393 + z * 668265263 + 1274126177; h = (h ^ (h >> 13)) * 1274126177; return (h ^ (h >> 16)) / 2147483648; }
  function smoothNoise(x, z) {
    const ix = Math.floor(x), iz = Math.floor(z), fx = x - ix, fz = z - iz;
    const sx = fx * fx * (3 - 2 * fx), sz = fz * fz * (3 - 2 * fz);
    return hash(ix, iz) * (1 - sx) * (1 - sz) + hash(ix + 1, iz) * sx * (1 - sz) + hash(ix, iz + 1) * (1 - sx) * sz + hash(ix + 1, iz + 1) * sx * sz;
  }
  function terrainHeight(x, z) {
    const dist = Math.sqrt(x * x + z * z);
    const edge = Math.max(0, (dist - 15) / 18);
    let h = 0;
    h += smoothNoise(x * 0.15, z * 0.15) * 3.5;
    h += smoothNoise(x * 0.4, z * 0.4) * 1.2;
    h += smoothNoise(x * 0.9, z * 0.9) * 0.4;
    const cf = dist < 6 ? (dist / 6) : 1;
    h *= cf * 0.65 + 0.35;
    h += edge * edge * 5.5;
    return h;
  }

  // Terrain base — with vertex colors for height variation
  const tSeg = isMobile ? 80 : 120;
  const tGeo = new THREE.PlaneGeometry(W, W, tSeg, tSeg);
  tGeo.rotateX(-Math.PI / 2);
  const tPos = tGeo.attributes.position.array;
  const tColors = new Float32Array(tPos.length);
  for (let i = 0; i < tPos.length; i += 3) {
    const h = terrainHeight(tPos[i], tPos[i + 2]);
    tPos[i + 1] = h;
    // Color by height: valleys dark green → mid bright green → peaks tan/brown
    const t = h / 5.5; // normalize 0~5.5
    const r = 0.22 + t * 0.32;         // 0.22 → 0.54
    const g = 0.38 + t * 0.18 - t*t*0.1; // 0.38 → 0.56 peak then drop
    const b = 0.15 + t * 0.06 - t*t*0.04; // slight variation
    tColors[i] = r; tColors[i+1] = g; tColors[i+2] = b;
  }
  tGeo.setAttribute('color', new THREE.BufferAttribute(tColors, 3));
  tGeo.computeVertexNormals();
  const terrain = new THREE.Mesh(tGeo, new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 0.82, metalness: 0 }));
  terrain.receiveShadow = true;
  scene.add(terrain);

  // Grass InstancedMesh
  const grassCount = isMobile ? 60000 : 150000;
  const grassGeo = new THREE.PlaneGeometry(0.07, 0.65, 1, 3);
  grassGeo.translate(0, 0.325, 0);
  const gap = grassGeo.attributes.position.array;
  gap[4] = 0.02; gap[5] = 0.65; gap[7] = -0.02; gap[8] = 0.65;

  const grassMat = new THREE.MeshStandardMaterial({ color: '#6B8E3A', roughness: 0.65, side: THREE.DoubleSide, transparent: true, alphaTest: 0.5 });
  const grass = new THREE.InstancedMesh(grassGeo, grassMat, grassCount);
  const dummy = new THREE.Object3D();
  const grassDataArr = [];
  const color3 = new THREE.Color();

  for (let i = 0; i < grassCount; i++) {
    let x, z, h, attempts = 0;
    do { x = (Math.random() - 0.5) * W; z = (Math.random() - 0.5) * W; h = terrainHeight(x, z); attempts++; }
    while ((h > 4.5 || (Math.sqrt(x * x + z * z) < 0.35 && Math.random() < 0.5)) && attempts < 50);

    dummy.position.set(x, h, z);
    const scale = 0.4 + Math.random() * 1.0;
    dummy.scale.set(1, scale, 1);
    dummy.rotation.y = Math.random() * Math.PI;
    dummy.rotation.x = (Math.random() - 0.5) * 0.18;
    dummy.updateMatrix();
    grass.setMatrixAt(i, dummy.matrix);

    const shade = 0.68 + Math.random() * 0.32;
    color3.setRGB(0.28 * shade, 0.52 * shade + 0.06, 0.12 * shade);
    grass.setColorAt(i, color3);
    grassDataArr.push({ x, z, h, scale, phase: Math.random() * Math.PI * 2 });
  }
  grass.instanceMatrix.needsUpdate = true;
  if (grass.instanceColor) grass.instanceColor.needsUpdate = true;
  grass.castShadow = true; grass.receiveShadow = true;
  grass.name = 'grass';
  scene.add(grass);

  // Wildflowers — pre-render flower textures, then scatter clusters
  const flowerGroup = new THREE.Group();

  // Pre-render a few flower types on canvas
  function drawFlower(canvas, petalColor, petalCount) {
    const ctx = canvas.getContext('2d');
    const cx = canvas.width / 2, cy = canvas.height / 2;
    // Stem
    ctx.strokeStyle = '#5A7A3A';
    ctx.lineWidth = 1.2;

          .position.set(x*0.45, 0.75, z*0.35);
    // Dark wood body
    const body = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.9, 1.0), new THREE.MeshStandardMaterial({ color: '#5A3E2E', roughness: 0.65 }));
    body.position.y = 1.5; body.castShadow = true; g.add(body);
    // Colored planks
    const plankColors = ['#6B4A35','#5C3E2A','#7A5A40','#4E3220'];
    for (let i = 0; i < 4; i++) {
      const plank = new THREE.Mesh(new THREE.BoxGeometry(1.32, 0.12, 0.06), new THREE.MeshStandardMaterial({ color: plankColors[i], roughness: 0.6 }));
      plank.position.set(0, 1.2 + i*0.2, 0.51); g.add(plank);
    }
    // Thatched roof with warm tone
    const roof = new THREE.Mesh(new THREE.ConeGeometry(0.9, 0.65, 7), new THREE.MeshStandardMaterial({ color: '#8B7355', roughness: 0.7 }));
    roof.position.y = 2.2; g.add(roof);
    // Purple windows
    for (let s = -1; s <= 1; s += 2) {
      g.add(new THREE.Mesh(new THREE.PlaneGeometry(0.2, 0.2), new THREE.MeshBasicMaterial({ color: '#9966CC', transparent: true, opacity: 0.7, depthWrite: false })))
        .position.set(s*0.3, 1.5, 0.51);
    }
    // Small ladder
    for (let i = 0; i < 4; i++) {
      g.add(new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.5, 5), new THREE.MeshStandardMaterial({ color: '#8B6A4E', roughness: 0.4 })))
        .position.set(0.45, 0.3 + i*0.35, 0.45);
    }
    // Misty particles (small spheres around base)
    for (let i = 0; i < 5; i++) {
      const mist = new THREE.Mesh(new THREE.SphereGeometry(0.25, 6, 6), new THREE.MeshBasicMaterial({ color: '#BBAACC', transparent: true, opacity: 0.2, depthWrite: false }));
      mist.position.set((Math.random()-0.5)*2, 0.2 + Math.random()*0.5, (Math.random()-0.5)*2);
      g.add(mist);
    }
    return g;
  }
  function mkBackpackRest() {
    // 旅人背囊 — large colorful traveler's backpack with accessories
    const g = new THREE.Group();
    // Main backpack body
    const bag = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.3, 0.5), new THREE.MeshStandardMaterial({ color: '#C4783A', roughness: 0.4 }));
    bag.position.set(0, 0.8, 0); bag.rotation.z = 0.1; bag.castShadow = true; g.add(bag);
    // Colorful top flap
    const flap = new THREE.Mesh(new THREE.SphereGeometry(0.44, 10, 8, 0, Math.PI*2, 0, Math.PI/2.3), new THREE.MeshStandardMaterial({ color: '#8B4A2A', roughness: 0.4 }));
    flap.position.y = 1.35; flap.rotation.z = 0.1; g.add(flap);
    // Bright side pocket
    const p1 = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.35, 0.1), new THREE.MeshStandardMaterial({ color: '#4A8B3A', roughness: 0.4 }));
    p1.position.set(0.38, 0.8, 0.2); g.add(p1);
    // Another pocket
    const p2 = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.25, 0.08), new THREE.MeshStandardMaterial({ color: '#3A6BA0', roughness: 0.4 }));
    p2.position.set(-0.35, 0.7, 0.22); g.add(p2);
    // Straps
    for (let s = 0; s < 3; s++) {
      const strap = new THREE.Mesh(new THREE.BoxGeometry(0.08, 1.0, 0.04), new THREE.MeshStandardMaterial({ color: '#4A3020', roughness: 0.5 }));
      strap.position.set(s*0.15 - 0.15, 0.7, -0.28); g.add(strap);
    }
    // Water bottle on side
    const bottle = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.08, 0.4, 8), new THREE.MeshStandardMaterial({ color: '#5588AA', roughness: 0.3, metalness: 0.5 }));
    bottle.position.set(-0.45, 0.5, 0.2); g.add(bottle);
    // Walking stick
    const stick = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.04, 1.6, 6), new THREE.MeshStandardMaterial({ color: '#7A5A3A', roughness: 0.5 }));
    stick.position.set(-0.15, 0.8, -0.38); stick.rotation.z = -0.2; g.add(stick);
    // Small bench
    g.add(new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.1, 0.25), new THREE.MeshStandardMaterial({ color: '#A08060', roughness: 0.4 }))).position.set(0.6, 0.15, 0.15);
    for (let s = -1; s <= 1; s += 2)
      g.add(new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.3, 0.1), new THREE.MeshStandardMaterial({ color: '#8B6A4E', roughness: 0.4 }))).position.set(0.6 + s*0.25, -0.1, 0.15);
    return g;
  }
  function mkTavern() {
    // 琥珀酒馆 — warm, inviting tavern with amber glow
    const g = new THREE.Group();
    // Warm plaster walls
    const body = new THREE.Mesh(new THREE.BoxGeometry(1.6, 1.5, 1.2), new THREE.MeshStandardMaterial({ color: '#E8C898', roughness: 0.45 }));
    body.position.y = 0.75; body.castShadow = true; g.add(body);
    // Dark timber beams
    for (let i = 0; i < 4; i++) {
      const beam = new THREE.Mesh(new THREE.BoxGeometry(1.65, 0.08, 0.06), new THREE.MeshStandardMaterial({ color: '#4A2A18', roughness: 0.4 }));
      beam.position.set(0, 0.2 + i*0.45, 0.61); g.add(beam);
    }
    // Rich red roof
    const roof = new THREE.Mesh(new THREE.ConeGeometry(1.2, 0.8, 4), new THREE.MeshStandardMaterial({ color: '#A83820', roughness: 0.4 }));
    roof.position.y = 1.8; roof.rotation.y = Math.PI/4; roof.castShadow = true; g.add(roof);
    // Large warm windows
    for (let s = -1; s <= 1; s += 2) {
      g.add(new THREE.Mesh(new THREE.PlaneGeometry(0.35, 0.35), new THREE.MeshBasicMaterial({ color: '#FFBB44' })))
        .position.set(s*0.4, 0.8, 0.61);
    }
    // Amber sign
    const signPole = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.06, 1.8, 6), new THREE.MeshStandardMaterial({ color: '#6B4E3A', roughness: 0.4 }));
    signPole.position.set(1.0, 1.1, 0.4); g.add(signPole);
    const signBoard = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.35, 0.06), new THREE.MeshStandardMaterial({ color: '#E8B860', roughness: 0.3, emissive: '#442200', emissiveIntensity: 0.3 }));
    signBoard.position.set(1.0, 1.95, 0.4); g.add(signBoard);
    // Lantern
    const lantern = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.25, 0.15), new THREE.MeshBasicMaterial({ color: '#FFAA33' }));
    lantern.position.set(1.0, 1.95, 0.25); g.add(lantern);
    // Stone chimney
    g.add(new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.7, 0.18), new THREE.MeshStandardMaterial({ color: '#8A7A6A', roughness: 0.6 })))
      .position.set(-0.5, 1.55, -0.3);
    // Small awning over door
    g.add(new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.3), new THREE.MeshStandardMaterial({ color: '#5A3020', roughness: 0.5, side: THREE.DoubleSide })))
      .position.set(0, 1.05, 0.65);
    return g;
  }

  const builders = [mkTrailCamp, mkStoneWorkshop, mkSwampHut, mkBackpackRest, mkTavern];

  landmarkDefs.forEach((data, idx) => {
    const group = new THREE.Group();
    const { a, d } = lmPos[idx];
    const x = Math.cos(a) * d, z = Math.sin(a) * d;
    const h = terrainHeight(x, z);

    const building = builders[idx]();
    group.add(building);

    // Text name label
    const nameCanvas = document.createElement('canvas');
    nameCanvas.width = 512; nameCanvas.height = 128;
    const nctx = nameCanvas.getContext('2d');
    nctx.fillStyle = 'rgba(20,10,5,0.55)';
    nctx.beginPath(); nctx.roundRect(60, 18, 392, 92, 20); nctx.fill();
    nctx.strokeStyle = 'rgba(255,220,180,0.5)';
    nctx.lineWidth = 3;
    nctx.beginPath(); nctx.roundRect(60, 18, 392, 92, 20); nctx.stroke();
    nctx.font = 'bold 48px "Noto Serif SC","SimSun",serif';
    nctx.fillStyle = '#FDF0D5';
    nctx.textAlign = 'center'; nctx.textBaseline = 'middle';
    nctx.shadowColor = 'rgba(0,0,0,0.5)'; nctx.shadowBlur = 6;
    nctx.fillText(data.title, 256, 64);
    const nameTex = new THREE.CanvasTexture(nameCanvas); nameTex.minFilter = THREE.LinearFilter;
    const nameSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: nameTex, transparent: true, depthTest: false, depthWrite: false }));
    nameSprite.position.y = 3.8; nameSprite.scale.set(3.5, 0.875, 1);
    group.add(nameSprite);

    // Emoji icon sprite
    const ec = document.createElement('canvas'); ec.width = 128; ec.height = 128;
    const ectx = ec.getContext('2d');
    ectx.font = '80px serif'; ectx.textAlign = 'center'; ectx.textBaseline = 'middle';
    ectx.fillText(data.icon, 64, 64);
    const emojiTex = new THREE.CanvasTexture(ec); emojiTex.minFilter = THREE.LinearFilter;
    const emoji = new THREE.Sprite(new THREE.SpriteMaterial({ map: emojiTex, transparent: true, depthTest: false, depthWrite: false }));
    emoji.position.y = 3.2; emoji.scale.set(1.5, 1.5, 1);
    group.add(emoji);

    const gRing = new THREE.Mesh(new THREE.RingGeometry(0.32, 0.55, 24), new THREE.MeshBasicMaterial({ color: '#FFAA66', side: THREE.DoubleSide, transparent: true, opacity: 0.18, depthWrite: false }));
    gRing.rotation.x = -Math.PI / 2; gRing.position.y = 0.02;
    group.add(gRing);

    group.position.set(x, h, z);
    group.userData = { id: data.id, landmarkData: data, hover: 0, baseY: h, building, glowRing: gRing };
    scene.add(group);
    landmarkGroups.push(group);
  });

  // Read markers
  const visited = JSON.parse(localStorage.getItem('visited_landmarks') || '[]');
  const readMarkers = [];
  function addReadMarker(group) {
    if (readMarkers.find(m => m.userData.lmGroup === group)) return;
    const m = new THREE.Mesh(new THREE.TorusGeometry(0.4, 0.04, 8, 16), new THREE.MeshBasicMaterial({ color: '#FFD700', transparent: true, opacity: 0.6, depthTest: false, depthWrite: false }));
    m.rotation.x = Math.PI / 2; m.position.copy(group.position); m.position.y += 2.5;
    m.userData = { lmGroup: group }; scene.add(m); readMarkers.push(m);
  }
  landmarkGroups.forEach(g => { if (visited.includes(g.userData.id)) addReadMarker(g); });

  // Raycaster
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  const allClickables = [...landmarkGroups, charGroup];

  // Hover
  const hovered = { obj: null };
  window.addEventListener('mousemove', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(allClickables, true);
    let hitGroup = null;
    if (hits.length > 0) { let o = hits[0].object; while (o) { if (allClickables.includes(o)) { hitGroup = o; break; } o = o.parent; } }
    if (hovered.obj && hovered.obj !== hitGroup && hovered.obj.userData && hovered.obj.userData.hover !== undefined) hovered.obj.userData.hover = 0;
    if (hitGroup && hitGroup.userData && hitGroup.userData.building) { hitGroup.userData.hover = 1; hovered.obj = hitGroup; document.body.style.cursor = 'pointer'; }
    else if (hitGroup === charGroup) { hovered.obj = charGroup; document.body.style.cursor = 'pointer'; }
    else { hovered.obj = null; document.body.style.cursor = 'grab'; }
  });

  // Click
  renderer.domElement.addEventListener('click', (e) => {
    if (e.target !== renderer.domElement && !renderer.domElement.contains(e.target)) return;
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(allClickables, true);
    if (hits.length > 0) {
      let o = hits[0].object;
      while (o) {
        if (o === charGroup) { openModal(LANDMARKS[0]); return; }
        if (landmarkGroups.includes(o)) {
          const data = o.userData.landmarkData;
          if (data) {
            if (!visited.includes(data.id)) { visited.push(data.id); localStorage.setItem('visited_landmarks', JSON.stringify(visited)); addReadMarker(o); }
            const p = o.position.clone();
            charTarget.set(p.x + 1.5, terrainHeight(p.x + 1.5, p.z - 1.5), p.z - 1.5);
            openModal(data);
          }
          return;
        }
        o = o.parent;
      }
    }
  });

  // Dialogue
  let dTimer = null;
  showDialogue = function(text, duration = 3000) {
    dialogueBubble.textContent = text; dialogueBubble.classList.add('show');
    clearTimeout(dTimer); dTimer = setTimeout(() => dialogueBubble.classList.remove('show'), duration);
    const cp = new THREE.Vector3(); charGroup.getWorldPosition(cp); cp.y += 1.4;
    const sp = cp.clone().project(camera);
    dialogueBubble.style.left = Math.max(10, Math.min(window.innerWidth - 270, (sp.x * 0.5 + 0.5) * window.innerWidth - 130)) + 'px';
    dialogueBubble.style.top = Math.max(10, (-sp.y * 0.5 + 0.5) * window.innerHeight - 60) + 'px';
  }

  // Eye tracking
  function updateCharEyes() {
    if (!lPupil || !rPupil) return;
    raycaster.setFromCamera(new THREE.Vector2(eyeTargetX, -eyeTargetY), camera);
    const ld = raycaster.ray.direction.clone();
    const mx = 0.35, lx = Math.max(-mx, Math.min(mx, ld.x * 1.5)), ly = Math.max(-mx, Math.min(mx, ld.y * 1.5));
    const lf = 0.06;
    lPupil.userData._tx = (lPupil.userData._tx || 0) + (lx - (lPupil.userData._tx || 0)) * lf;
    lPupil.userData._ty = (lPupil.userData._ty || 0) + (ly - (lPupil.userData._ty || 0)) * lf;

    if (lPupil.isBone) {
      // GLB bone — rotate the eye bones
      lPupil.rotation.z = lPupil.userData._ty * 0.5;
      lPupil.rotation.y = lPupil.userData._tx * 0.5;
      if (rPupil.isBone) {
        rPupil.rotation.z = lPupil.userData._ty * 0.5;
        rPupil.rotation.y = lPupil.userData._tx * 0.5;
      }
    } else if (lPupil.position) {
      // Fallback geometry — offset pupil position
      lPupil.position.x = -0.09 + lPupil.userData._tx * 0.035;
      lPupil.position.y = 1.19 + lPupil.userData._ty * 0.03;
      if (rPupil.position) {
        rPupil.position.x = 0.09 + lPupil.userData._tx * 0.035;
        rPupil.position.y = 1.19 + lPupil.userData._ty * 0.03;
      }
    }
  }

  // Animation
  const clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);
    const now = performance.now();
    const dt = Math.min(clock.getDelta(), 0.1);
    const t = now * 0.001;

    // Camera transition: 俯视 → 平视站在人物面前
    if (cameraAnimating) {
      const elapsed = Math.min(1, (performance.now() - cameraAnimStart) / 2800);
      const ease = 1 - Math.pow(1 - elapsed, 3);
      camera.position.lerpVectors(CAMERA_START, CAMERA_END, ease);
      controls.target.lerpVectors(TARGET_START, TARGET_END, ease);
      if (elapsed >= 1) {
        cameraAnimating = false;
        showDialogue('👆 戳我看看我是谁~', 8000);
      }
    }

    controls.update();

    // Grass sway
    const m4 = new THREE.Matrix4();
    const v3 = new THREE.Vector3();
    const quat = new THREE.Quaternion();
    const scl = new THREE.Vector3();

    for (let i = 0; i < grassCount; i++) {
      grass.getMatrixAt(i, m4); m4.decompose(v3, quat, scl);
      const gd = grassDataArr[i];
      const wave = Math.sin(gd.x * 0.7 + t * 1.3) * Math.cos(gd.z * 0.6 + t * 1.1) * 0.1 + Math.sin(gd.x * 1.4 - t * 1.8) * 0.05;
      dummy.position.copy(v3); dummy.scale.copy(scl);
      dummy.rotation.set(0, 0, 0);
      dummy.rotateY(Math.atan2(Math.sin(quat.y || 0), Math.cos(quat.y || 0)) * 2 || 0);
      dummy.rotateZ(wave);
      dummy.rotateX(Math.sin(gd.phase + t * 2.5) * 0.07);
      dummy.updateMatrix();
      grass.setMatrixAt(i, dummy.matrix);
      const shade = 0.7 + Math.sin(gd.phase + t * 1.5) * 0.08;
      color3.setRGB(0.28 * shade, 0.52 * shade + 0.06, 0.12 * shade);
      grass.setColorAt(i, color3);
    }
    grass.instanceMatrix.needsUpdate = true;
    if (grass.instanceColor) grass.instanceColor.needsUpdate = true;

    // Clouds
    clouds.forEach(c => {
      c.position.x += c.userData.sx; c.position.z += c.userData.sz;
      if (c.position.x > 25) c.position.x = -25; if (c.position.x < -25) c.position.x = 25;
      if (c.position.z > 25) c.position.z = -25; if (c.position.z < -25) c.position.z = 25;
      c.position.y = c.userData.by + Math.sin(t * 0.4 + c.position.x * 0.1) * 0.5;
    });

    // Fireflies
    ffData.forEach(fd => {
      fd.sprite.position.x = fd.bx + Math.sin(t * fd.sp * 10 + fd.ph) * fd.amp;
      fd.sprite.position.z = fd.bz + Math.cos(t * fd.sp * 8 + fd.ph + 1) * fd.amp;
      fd.sprite.position.y = fd.by + Math.sin(t * fd.sp * 6 + fd.ph) * 0.7;
      fd.sprite.material.opacity = 0.25 + Math.sin(t * fd.sp * 5 + fd.ph) * 0.4;
    });

    // Landmark hover
    landmarkGroups.forEach(g => {
      const target = g.userData.hover || 0;
      g.userData._h = (g.userData._h || 0) + (target - (g.userData._h || 0)) * 0.08;
      const h = g.userData._h;
      if (g.userData.glowRing) g.userData.glowRing.material.opacity = 0.12 + h * 0.45;
      g.position.y = g.userData.baseY + h * 0.15;
    });

    // Character animation
    if (charTarget) {
      charGroup.position.x += (charTarget.x - charGroup.position.x) * 0.05;
      charGroup.position.z += (charTarget.z - charGroup.position.z) * 0.05;
      charGroup.position.y = terrainHeight(charGroup.position.x, charGroup.position.z);
      const dx = charTarget.x - charGroup.position.x;
      const dz = charTarget.z - charGroup.position.z;
      if (Math.abs(dx) > 0.01 || Math.abs(dz) > 0.01) {
        charGroup.rotation.y += (Math.atan2(dx, dz) - charGroup.rotation.y) * 0.1;
      }
      // Camera follows character during tour
      if (followChar) {
        const cp = new THREE.Vector3();
        charGroup.getWorldPosition(cp);
        controls.target.lerp(new THREE.Vector3(cp.x, cp.y + 3, cp.z), 0.03);
        const dist = charGroup.position.distanceTo(charTarget);
        if (dist < 0.3) followChar = false;
      }
    }
    // Idle animation — gentle wave (rotate whole body side to side + bob)
    if (!charTarget || charGroup.position.distanceTo(charTarget) < 0.1) {
      charGroup.rotation.z = Math.sin(t * 2) * 0.08;
      charGroup.position.y += Math.sin(t * 2.5) * 0.15;
      // Wave right arm if fallback is still present
      const rArm = fallbackGroup.getObjectByName('rightArm');
      if (rArm && charGroup.children.includes(fallbackGroup)) {
        rArm.rotation.z = 0.5 + Math.sin(t * 3.5) * 0.8;
      }
    }

    readMarkers.forEach(m => { m.rotation.z += 0.008; });

    updateCharEyes();

    if (dialogueBubble.classList.contains('show')) {
      const cp = new THREE.Vector3(); charGroup.getWorldPosition(cp); cp.y += 1.4;
      const sp = cp.clone().project(camera);
      dialogueBubble.style.left = Math.max(10, Math.min(window.innerWidth - 270, (sp.x * 0.5 + 0.5) * window.innerWidth - 130)) + 'px';
      dialogueBubble.style.top = Math.max(10, (-sp.y * 0.5 + 0.5) * window.innerHeight - 60) + 'px';
    }

    renderer.render(scene, camera);
  }

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  animate();
}
</script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#08080f">
<meta name="description" content="职场能量罗盘 - 发现你的职场生存模式。24道题，8分钟，找到你在职场中的核心矛盾与应对策略。">
<meta property="og:title" content="职场能量罗盘 - 发现你的职场生存模式">
<meta property="og:description" content="24道题测出你的职场生存模式，获得专属行动指南。">
<meta property="og:type" content="website">
<title>职场能量罗盘 - 发现你的职场生存模式</title>
<style>
/* ===== CSS Variables ===== */
:root {
  --bg-deep: #0a0a0f;
  --bg-primary: #0f0f18;
  --bg-card: #161622;
  --bg-elevated: #1c1c2e;
  --accent-cyan: #7cc8d8;
  --accent-purple: #9b8ec4;
  --accent-rose: #c9a0b8;
  --accent-gold: #c9b878;
  --accent-green: #7eb89e;
  --accent-coral: #c98080;
  --gradient-main: linear-gradient(135deg, #9b8ec4, #7cc8d8);
  --gradient-accent: linear-gradient(135deg, #c9a0b8, #c9b878);
  --text-primary: #e8e8f0;
  --text-secondary: #9898b0;
  --text-muted: #686880;
  --border-subtle: rgba(155, 142, 196, 0.12);
  --border-glow: rgba(124, 200, 216, 0.25);
  --shadow-neon: 0 0 30px rgba(124, 200, 216, 0.12), 0 0 80px rgba(155, 142, 196, 0.06);
  --shadow-elevated: 0 4px 32px rgba(0, 0, 0, 0.4);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 20px;
  --radius-xl: 28px;
  --font-heading: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
  --font-body: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
  --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font-body);
  background: var(--bg-deep);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
  user-select: none;
}
button { font-family: inherit; border: none; cursor: pointer; background: none; color: inherit; -webkit-appearance: none; appearance: none; }
.report-section * { -webkit-touch-callout: default; user-select: text; }

/* ===== Canvas Background ===== */
#particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

/* ===== App Container ===== */
#app { position: relative; z-index: 1; height: 100%; width: 100%; max-width: 720px; margin: 0 auto; display: flex; flex-direction: column; overflow: hidden; }

/* ===== Page Base ===== */
.page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 20px; opacity: 0; transform: translateY(20px); pointer-events: none; transition: opacity 400ms cubic-bezier(0.4,0,0.2,1), transform 400ms cubic-bezier(0.4,0,0.2,1); overflow-y: auto; -webkit-overflow-scrolling: touch; }
.page.active { opacity: 1; transform: translateY(0); pointer-events: auto; }

/* ===== Loading Page ===== */
#page-loading.active { background: var(--bg-deep); }

/* ===== Start Page — Screen Card ===== */
#page-start { gap: clamp(12px, 3vh, 24px); }
.screen-label { font-size: clamp(15px, 3vw, 20px); color: var(--text-muted); letter-spacing: 3px; text-transform: uppercase; text-align: center; }
.screen-card {
  width: min(82vw, 420px); aspect-ratio: 1 / 1;
  border-radius: clamp(16px, 3vw, 24px);
  background: radial-gradient(ellipse at center, rgba(155,142,196,0.06) 0%, rgba(0,0,0,0.3) 100%), var(--bg-card);
  border: 1px solid rgba(255,255,255,0.06);
  position: relative; overflow: hidden;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.02), 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.02);
}
.screen-inner {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: clamp(12px, 2vh, 20px);
  transition: transform 400ms cubic-bezier(0.4,0,0.2,1), opacity 300ms ease;
}
.screen-compass {
  width: 68%; aspect-ratio: 1 / 1;
  transition: transform 800ms cubic-bezier(0.25,0.1,0.25,1);
}
.screen-compass svg { width: 100%; height: 100%; overflow: visible; }
.screen-compass .dot-north, .screen-compass .dot-south,
.screen-compass .dot-east, .screen-compass .dot-west { transition: transform 400ms cubic-bezier(0.25,0.1,0.25,1); }

/* Screen idle animation — slow breathing rotation */
#page-start.active .screen-compass { animation: compassBreathe 8s ease-in-out infinite; }
@keyframes compassBreathe {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(3deg); }
  75% { transform: rotate(-3deg); }
}

/* PLAY button */
.screen-play {
  display: flex; align-items: center; gap: 10px;
  padding: clamp(12px, 2vh, 16px) clamp(28px, 5vw, 40px);
  border-radius: 50px;
  font-size: clamp(15px, 2.5vw, 18px); font-weight: 600; color: #fff;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  cursor: pointer; transition: all 300ms ease;
  backdrop-filter: blur(4px);
}
.screen-play:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
.screen-play:active { transform: scale(0.96); }
.play-icon { font-size: clamp(18px, 3vw, 24px); }

/* Screen animations — triggered by JS */
.screen-compass.spinning { animation: spinFast 0.8s cubic-bezier(0.25,0.1,0.25,1) forwards !important; }
@keyframes spinFast { 0% { transform: rotate(0deg); } 100% { transform: rotate(720deg); } }
.screen-compass.converging .dot-north,
.screen-compass.converging .dot-south,
.screen-compass.converging .dot-east,
.screen-compass.converging .dot-west { transform: translate(0, 0) !important; }
.screen-compass.converging .dot-north { transform: translate(0, 34px) !important; }
.screen-compass.converging .dot-south { transform: translate(0, -34px) !important; }
.screen-compass.converging .dot-east { transform: translate(-34px, 0) !important; }
.screen-compass.converging .dot-west { transform: translate(34px, 0) !important; }
.screen-inner.burst { transform: scale(20); opacity: 0; transition: transform 500ms cubic-bezier(0.6,0,1,1), opacity 400ms ease; }

.screen-sub { font-size: clamp(13px, 2vw, 15px); color: var(--text-muted); text-align: center; letter-spacing: 1px; }
/* Staggered fade-in for start page text */
#page-start .screen-label, #page-start .screen-card, #page-start .screen-sub { opacity: 0; transform: translateY(12px); }
#page-start.active .screen-label { animation: fadeInUp 500ms ease-out 100ms forwards; }
#page-start.active .screen-card { animation: fadeInUp 500ms ease-out 250ms forwards; }
#page-start.active .screen-sub { animation: fadeInUp 500ms ease-out 450ms forwards; }
@keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

/* ===== Shared Button Styles ===== */
.btn-primary { padding: 16px 48px; border-radius: var(--radius-xl); font-size: 17px; font-weight: 600; color: #fff; background: var(--gradient-main); box-shadow: var(--shadow-neon); transition: all 200ms ease; position: relative; }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 0 20px rgba(124,200,216,0.18), 0 0 50px rgba(155,142,196,0.08); }
.btn-primary:active { transform: scale(0.98); }

/* ===== Quiz Page ===== */
#page-quiz { justify-content: flex-start; padding-top: 80px; }
.progress-wrap { width: 100%; max-width: 400px; margin-bottom: 32px; }
.progress-info { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; color: var(--text-muted); }
.progress-track { width: 100%; height: 4px; background: var(--bg-card); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--gradient-main); border-radius: 2px; transition: width 300ms ease; box-shadow: none; }
.module-indicator { font-size: 12px; color: var(--accent-cyan); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; text-align: center; }
.question-card { width: 100%; max-width: 460px; animation: slideInRight 350ms ease-out; }
.question-card.reverse { animation: slideInLeft 350ms ease-out; }
@keyframes slideInRight { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
@keyframes slideInLeft { from { opacity: 0; transform: translateX(-40px); } to { opacity: 1; transform: translateX(0); } }
.question-number { font-size: 13px; color: var(--accent-purple); margin-bottom: 12px; font-weight: 600; }
.question-text { font-size: 19px; font-weight: 500; line-height: 1.5; margin-bottom: 24px; color: var(--text-primary); }
.options-grid { display: flex; flex-direction: column; gap: 12px; }
.option-btn { display: flex; align-items: flex-start; gap: 12px; width: 100%; padding: 16px; border-radius: var(--radius-md); background: var(--bg-card); border: 1px solid var(--border-subtle); text-align: left; transition: all 200ms ease; cursor: pointer; min-height: 56px; }
.option-btn:hover { border-color: rgba(124,200,216,0.4); background: rgba(124,200,216,0.03); }
.option-btn.selected { border-color: var(--accent-cyan); background: linear-gradient(145deg, rgba(124,200,216,0.08), rgba(155,142,196,0.05)); }
.option-letter { flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%; background: var(--bg-elevated); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: var(--text-muted); transition: all 200ms ease; }
.option-btn.selected .option-letter { background: var(--accent-cyan); color: #1a1a28; }
.option-text { font-size: 15px; line-height: 1.6; color: var(--text-secondary); }
.option-btn.selected .option-text { color: var(--text-primary); }
.quiz-nav { display: flex; justify-content: space-between; width: 100%; max-width: 460px; margin-top: 24px; gap: 16px; }
.btn-back, .btn-next { padding: 12px 24px; border-radius: var(--radius-md); font-size: 14px; font-weight: 500; transition: all 200ms ease; }
.btn-back { color: var(--text-muted); border: 1px solid var(--border-subtle); }
.btn-back:hover { color: var(--text-secondary); border-color: var(--text-muted); }
.btn-next { color: #fff; background: var(--gradient-main); opacity: 0.4; pointer-events: none; transition: all 200ms ease; }
.btn-next.enabled { opacity: 1; pointer-events: auto; }
.btn-next.enabled:hover { background: linear-gradient(135deg, #a99ccf, #8cd2df); }

/* ===== Result Page ===== */
#page-result { justify-content: flex-start; padding-top: 40px; padding-bottom: 120px; }
.result-compact { width: 100%; max-width: 460px; display: flex; flex-direction: column; align-items: center; }
.mode-emoji { font-size: 64px; margin-bottom: 12px; animation: floatIn 600ms ease-out; }
@keyframes floatIn { from { opacity: 0; transform: translateY(20px) scale(0.8); } to { opacity: 1; transform: translateY(0) scale(1); } }
.mode-name { font-size: 30px; font-weight: 700; text-align: center; margin-bottom: 4px; }
.mode-name-en { font-size: 14px; color: var(--text-muted); font-family: var(--font-mono); margin-bottom: 12px; }
.mode-tagline { font-size: 16px; color: var(--text-secondary); text-align: center; font-style: italic; line-height: 1.5; margin-bottom: 28px; padding: 0 16px; }

/* Dashboard */
.dashboard { width: 100%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
.gauge { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.gauge-ring { position: relative; width: 64px; height: 64px; }
.gauge-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.gauge-bg { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 3; }
.gauge-fill { fill: none; stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 1400ms cubic-bezier(0.4,0,0.2,1); }
.gauge-value { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 16px; font-weight: 700; }
.gauge-label { font-size: 11px; color: var(--text-muted); text-align: center; }

/* Core Contradiction */
.contradiction-card { width: 100%; padding: 20px; border-radius: var(--radius-lg); background: var(--bg-card); border: 1px solid var(--border-subtle); margin-bottom: 24px; }
.contradiction-card h4 { font-size: 13px; color: var(--accent-coral); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
.contradiction-card p { font-size: 15px; color: var(--text-primary); line-height: 1.6; }

/* Expand Button */
.btn-expand { width: 100%; padding: 14px; border-radius: var(--radius-md); font-size: 15px; color: var(--accent-cyan); border: 1px solid var(--border-glow); background: rgba(124,200,216,0.05); transition: all 200ms ease; margin-bottom: 24px; }
.btn-expand:hover { background: rgba(124,200,216,0.1); }

/* Full Report */
.result-full { width: 100%; max-width: 460px; max-height: 0; opacity: 0; overflow: hidden; transition: max-height 600ms cubic-bezier(0.4,0,0.2,1), opacity 400ms ease; }
.result-full.expanded { max-height: 12000px; opacity: 1; }
.report-section { margin-bottom: 28px; padding: 24px; border-radius: var(--radius-lg); background: var(--bg-card); border: 1px solid var(--border-subtle); }
.report-section h3 { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: var(--text-primary); letter-spacing: 0.5px; }
.report-section h4 { font-size: 15px; font-weight: 600; margin-bottom: 8px; color: var(--text-primary); }
.report-section p { font-size: 14px; line-height: 1.8; color: var(--text-secondary); }
.report-section .highlight { color: var(--accent-cyan); }
.superpower-item, .trap-item, .strategy-item { margin-bottom: 16px; }
.superpower-item:last-child, .trap-item:last-child, .strategy-item:last-child { margin-bottom: 0; }
.power-icon, .trap-icon, .strategy-icon { font-size: 20px; margin-right: 6px; }
.signal-tag { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; margin-top: 6px; background: rgba(201,128,128,0.15); color: var(--accent-coral); }
.action-tag { display: inline-block; padding: 6px 12px; border-radius: 12px; font-size: 13px; margin-top: 8px; background: rgba(124,200,216,0.1); color: var(--accent-cyan); }
.relation-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
.relation-table th, .relation-table td { padding: 10px 12px; font-size: 13px; line-height: 1.5; text-align: left; border-bottom: 1px solid var(--border-subtle); }
.relation-table th { color: var(--text-muted); font-weight: 500; font-size: 12px; }
.relation-table td { color: var(--text-secondary); }

/* Result Actions */
.result-actions { position: fixed; bottom: 0; left: 0; right: 0; padding: 16px 20px calc(16px + env(safe-area-inset-bottom, 0px)); background: linear-gradient(180deg, transparent, var(--bg-deep) 40%); display: flex; gap: 12px; justify-content: center; z-index: 10; max-width: 720px; margin: 0 auto; }
.btn-secondary { padding: 14px 28px; border-radius: var(--radius-xl); font-size: 15px; font-weight: 500; color: var(--text-secondary); border: 1px solid var(--border-subtle); transition: all 200ms ease; }
.btn-secondary:hover { border-color: var(--text-muted); color: var(--text-primary); }

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-glow); }

/* ===== Mobile ===== */
@media (max-width: 480px) {
  .mode-name { font-size: 25px; }
  .question-text { font-size: 17px; }
  .option-btn { padding: 14px; min-height: 52px; }
  .option-text { font-size: 14px; }
  .dashboard { grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .gauge-ring { width: 52px; height: 52px; }
  .gauge-value { font-size: 14px; }
  .page { padding: 20px 16px; }
  #page-quiz { padding-top: 60px; }
}
@media (max-width: 360px) {
  .screen-card { width: 88vw; border-radius: 14px; }
  .screen-compass { width: 72%; }
}
@media (min-width: 768px) {
  .question-text { font-size: 20px; }
  .option-text { font-size: 16px; }
}
</style>
</head>
<body>
<canvas id="particleCanvas"></canvas>
<div id="app">
  <!-- Loading -->
  <section id="page-loading" class="page active"></section>
  <!-- Start -->
  <section id="page-start" class="page">
    <p class="screen-label">职场能量罗盘</p>
    <div class="screen-card" id="screenCard">
      <div class="screen-inner" id="screenInner">
        <div class="screen-compass" id="screenCompass">
          <svg viewBox="0 0 200 200">
            <defs>
              <radialGradient id="cg" cx="50%" cy="50%"><stop offset="0%" stop-color="rgba(255,255,255,0.06)"/><stop offset="100%" stop-color="rgba(255,255,255,0)"/></radialGradient>
            </defs>
            <!-- Outer glow ring -->
            <circle cx="100" cy="100" r="94" fill="none" stroke="rgba(155,142,196,0.06)" stroke-width="0.5"/>
            <!-- Tick ring: 72 ticks at 5° intervals -->
            <g id="ticks" stroke="rgba(255,255,255,0.12)" stroke-width="0.4">
              <g id="tickGroup"></g>
            </g>
            <!-- Outer ring -->
            <circle cx="100" cy="100" r="88" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.6"/>
            <!-- Major tick ring (12 ticks at 30°) -->
            <g id="majorTicks" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"></g>
            <!-- Mid ring -->
            <circle cx="100" cy="100" r="78" fill="none" stroke="rgba(124,200,216,0.08)" stroke-width="0.5"/>
            <!-- Inner ring -->
            <circle cx="100" cy="100" r="65" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.4"/>
            <!-- Compass rose: 8-pointed star -->
            <g stroke="rgba(255,255,255,0.06)" stroke-width="0.4" fill="none">
              <polygon points="100,12 108,92 188,100 108,108 100,188 92,108 12,100 92,92"/>
              <polygon points="100,30 104,96 170,100 104,104 100,170 96,104 30,100 96,96" stroke="rgba(255,255,255,0.04)"/>
            </g>
            <!-- Cardinal lines -->
            <g stroke="rgba(255,255,255,0.05)" stroke-width="0.4">
              <line x1="100" y1="6" x2="100" y2="194"/>
              <line x1="6" y1="100" x2="194" y2="100"/>
              <line x1="34" y1="34" x2="166" y2="166"/>
              <line x1="166" y1="34" x2="34" y2="166"/>
            </g>
            <!-- Inner rose ring -->
            <circle cx="100" cy="100" r="48" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.4"/>
            <!-- Center hub -->
            <circle cx="100" cy="100" r="10" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.6"/>
            <circle cx="100" cy="100" r="6" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
            <circle cx="100" cy="100" r="2.5" fill="rgba(255,255,255,0.25)"/>
            <!-- Cardinal dots (colored, parallax) -->
            <circle cx="100" cy="12" r="3.5" fill="#9b8ec4" class="dot-north" data-depth="0.7" style="filter: drop-shadow(0 0 4px rgba(155,142,196,0.5))"/>
            <circle cx="188" cy="100" r="3.5" fill="#7cc8d8" class="dot-east" data-depth="0.5" style="filter: drop-shadow(0 0 4px rgba(124,200,216,0.5))"/>
            <circle cx="100" cy="188" r="3.5" fill="#c9a0b8" class="dot-south" data-depth="0.7" style="filter: drop-shadow(0 0 4px rgba(201,160,184,0.5))"/>
            <circle cx="12" cy="100" r="3.5" fill="#c9b878" class="dot-west" data-depth="0.5" style="filter: drop-shadow(0 0 4px rgba(201,184,120,0.5))"/>
            <!-- Secondary dots at intercardinal positions -->
            <circle cx="162" cy="38" r="1.5" fill="rgba(155,142,196,0.5)" data-depth="0.3"/>
            <circle cx="162" cy="162" r="1.5" fill="rgba(124,200,216,0.5)" data-depth="0.3"/>
            <circle cx="38" cy="162" r="1.5" fill="rgba(201,160,184,0.5)" data-depth="0.3"/>
            <circle cx="38" cy="38" r="1.5" fill="rgba(201,184,120,0.5)" data-depth="0.3"/>
          </svg>
        </div>
        <button class="screen-play" id="btnPlay" onclick="startQuiz()">
          <span class="play-icon">▶</span>
          <span>开始测评</span>
        </button>
      </div>
    </div>
    <p class="screen-sub">发现你的职场生存模式</p>
  </section>
  <!-- Quiz -->
  <section id="page-quiz" class="page">
    <div class="progress-wrap">
      <div class="progress-info"><span id="progressText">1 / 24</span><span id="moduleLabel" class="module-indicator">模块一：能量来源</span></div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:4.2%"></div></div>
    </div>
    <div class="question-card" id="questionCard">
      <div class="question-number" id="questionNumber">Q1</div>
      <h3 class="question-text" id="questionText"></h3>
      <div class="options-grid" id="optionsGrid"></div>
    </div>
    <div class="quiz-nav">
      <button class="btn-back" id="btnBack" onclick="prevQuestion()">← 上一题</button>
      <button class="btn-next" id="btnNext" onclick="nextQuestion()">下一题 →</button>
    </div>
  </section>
  <!-- Result -->
  <section id="page-result" class="page">
    <div class="result-compact" id="resultCompact"></div>
    <div class="result-full collapsed" id="resultFull"></div>
    <div class="result-actions">
      <button class="btn-secondary" onclick="resetQuiz()">重新测评</button>
      <button class="btn-primary" onclick="saveResult()">保存结果</button>
    </div>
  </section>
</div>

<script>
// ==================== DATA ====================
const QUESTIONS = [

// ==================== PARTICLE ENGINE ====================
class ParticleEngine {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.particles = [];
    this.mouse = { x: -9999, y: -9999 };
    this.colorBias = { r: 155, g: 142, b: 196 }; // muted purple
    this.resize();
    this.init();
    this.bindEvents();
    this.animate();
  }
  resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    this.width = window.innerWidth;
    this.height = window.innerHeight;
    this.canvas.width = this.width * dpr;
    this.canvas.height = this.height * dpr;
    this.canvas.style.width = this.width + 'px';
    this.canvas.style.height = this.height + 'px';
    this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    this.pCount = this.width < 768 ? 60 : 120;
    this.connectDist = this.width < 768 ? 80 : 120;
  }
  init() {
    this.particles = [];
    for (let i = 0; i < this.pCount; i++) {
      this.particles.push({
        x: Math.random() * this.width,
        y: Math.random() * this.height,
        vx: (Math.random() - 0.5) * 0.5,
        vy: (Math.random() - 0.5) * 0.5,
        size: Math.random() * 2 + 0.5,
        opacity: Math.random() * 0.2 + 0.05
      });
    }
  }
  bindEvents() {
    window.addEventListener('resize', () => { this.resize(); this.init(); });
    document.addEventListener('mousemove', e => { this.mouse.x = e.clientX; this.mouse.y = e.clientY; });
    document.addEventListener('touchmove', e => { if (e.touches[0]) { this.mouse.x = e.touches[0].clientX; this.mouse.y = e.touches[0].clientY; } }, {passive:true});
  }
  setColorBias(r, g, b) { this.colorBias = { r, g, b }; }
  animate() {
    this.ctx.clearRect(0, 0, this.width, this.height);
    const {r,g,b} = this.colorBias;
    for (let i = 0; i < this.particles.length; i++) {
      const p = this.particles[i];
      // Mouse repulsion
      const dx = p.x - this.mouse.x, dy = p.y - this.mouse.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 80) {
        const force = (80 - dist) / 80 * 0.03;
        p.vx += (dx / dist) * force;
        p.vy += (dy / dist) * force;
      }
      // Friction
      p.vx *= 0.999; p.vy *= 0.999;
      p.x += p.vx; p.y += p.vy;
      // Wrap
      if (p.x < 0) p.x = this.width; if (p.x > this.width) p.x = 0;
      if (p.y < 0) p.y = this.height; if (p.y > this.height) p.y = 0;
      // Draw
      this.ctx.beginPath();
      this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      this.ctx.fillStyle = `rgba(${r},${g},${b},${p.opacity})`;
      this.ctx.fill();
      // Connect nearby
      for (let j = i + 1; j < this.particles.length; j++) {
        const p2 = this.particles[j];
        const dx2 = p.x - p2.x, dy2 = p.y - p2.y;
        const dist2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);
        if (dist2 < this.connectDist) {
          this.ctx.beginPath();
          this.ctx.moveTo(p.x, p.y);
          this.ctx.lineTo(p2.x, p2.y);
          this.ctx.strokeStyle = `rgba(${r},${g},${b},${0.025 * (1 - dist2 / this.connectDist)})`;
          this.ctx.lineWidth = 0.5;
          this.ctx.stroke();
        }
      }
    }
    requestAnimationFrame(() => this.animate());
  }
}

// ==================== NAVIGATION ====================
function navigateTo(page) {
  Object.keys($pages).forEach(k => {
    $pages[k].classList.remove('active');
  });
  $pages[page].classList.add('active');
  state.page = page;
  if (page === 'result') {
    $resultFull.classList.remove('expanded');
    $resultFull.classList.add('collapsed');
    state.reportExpanded = false;
  }
}

// ==================== PARTICLE COLOR THEMES ====================
function setParticleTheme(page) {
  if (!window._particles) return;
  const themes = {
    loading: [155,142,196],
    start: [155,142,196],
    quiz: [124,200,216],
    result: [124,200,216]
  };
  const [r,g,b] = themes[page] || [155,142,196];
  window._particles.setColorBias(r,g,b);
}

// ==================== START PAGE INTERACTIONS ====================
let _compassParallaxBound = false;
let _magnetBound = false;

function setupStartInteractions() {
  const compass = document.getElementById('screenCompass');
  const btn = document.getElementById('btnPlay');
  if (!compass || !btn) return;

  // Compass parallax: dots shift toward cursor
  if (!_compassParallaxBound) {
    document.addEventListener('mousemove', e => {
      if (state.page !== 'start') return;
      const rect = compass.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = (e.clientX - cx) / (rect.width / 2);
      const dy = (e.clientY - cy) / (rect.height / 2);
      const c = (v, max) => Math.max(-max, Math.min(max, v));
      compass.querySelectorAll('[data-depth]').forEach(dot => {
        const depth = parseFloat(dot.dataset.depth);
        dot.style.transform = `translate(${c(dx*depth*10,10)}px, ${c(dy*depth*10,10)}px)`;
      });
    });
    _compassParallaxBound = true;
  }

  // Magnetic button (subtle)
  if (!_magnetBound && btn) {
    btn.addEventListener('mousemove', e => {
      const rect = btn.getBoundingClientRect();
      const bx = rect.left + rect.width / 2, by = rect.top + rect.height / 2;
      btn.style.transform = `translate(${(e.clientX-bx)/(rect.width/2)*3}px, ${(e.clientY-by)/(rect.height/2)*2}px)`;
    });
    btn.addEventListener('mouseleave', () => { btn.style.transform = ''; });
    _magnetBound = true;
  }
}

// Boot interactions
window.addEventListener('DOMContentLoaded', () => { setTimeout(setupStartInteractions, 400); });

// ==================== GENERATE COMPASS TICKS ====================
function generateTicks() {
  const tickGroup = document.getElementById('tickGroup');
  const majorTickGroup = document.getElementById('majorTicks');
  if (!tickGroup || !majorTickGroup) return;
  let h = '';
  for (let i = 0; i < 72; i++) { h += `<line x1="100" y1="12" x2="100" y2="16" transform="rotate(${i*5} 100 100)"/>`; }
  tickGroup.innerHTML = h;
  h = '';
  for (let i = 0; i < 12; i++) { h += `<line x1="100" y1="12" x2="100" y2="21" transform="rotate(${i*30} 100 100)"/>`; }
  majorTickGroup.innerHTML = h;
}

// ==================== INIT ====================
function init() {
  const canvas = document.getElementById('particleCanvas');
  window._particles = new ParticleEngine(canvas);
  generateTicks();
  setTimeout(() => {
    navigateTo('start');
    setParticleTheme('start');
  }, 800);
}

// ==================== START QUIZ — with animation ====================
function startQuiz() {
  const compass = document.getElementById('screenCompass');
  const inner = document.getElementById('screenInner');
  if (!compass || !inner) { beginQuiz(); return; }

  // Phase 1: Fast spin
  compass.classList.add('spinning');

  // Phase 2: Dots converge (overlaps slightly with spin end)
  setTimeout(() => {
    compass.classList.add('converging');
  }, 600);

  // Phase 3: Screen bursts
  setTimeout(() => {
    inner.classList.add('burst');
  }, 1000);

  // Phase 4: Navigate to quiz
  setTimeout(() => {
    beginQuiz();
  }, 1400);
}

function beginQuiz() {
  state.currentQ = 0;
  state.answers = new Array(24).fill(null);
  state.direction = 1;
  // Reset screen animation classes for next visit
  const compass = document.getElementById('screenCompass');
  const inner = document.getElementById('screenInner');
  if (compass) { compass.classList.remove('spinning','converging'); }
  if (inner) { inner.classList.remove('burst'); }
  navigateTo('quiz');
  setParticleTheme('quiz');
  renderQuestion();
}

// ==================== RENDER QUESTION ====================
function renderQuestion() {
  const i = state.currentQ;
  const q = QUESTIONS[i];
  const animClass = state.direction > 0 ? '' : 'reverse';
  $questionCard.className = 'question-card ' + animClass;
  // Force re-trigger animation
  void $questionCard.offsetWidth;
  $questionCard.className = 'question-card ' + animClass;

  $questionNumber.textContent = 'Q' + q.id;
  $questionText.textContent = q.text;
  $moduleLabel.textContent = MODULE_NAMES[i];

  let html = '';
  q.options.forEach(opt => {
    const sel = state.answers[i] === opt.l ? ' selected' : '';
    html += `<button class="option-btn${sel}" data-letter="${opt.l}" onclick="selectAnswer('${opt.l}')">
      <span class="option-letter">${opt.l}</span>
      <span class="option-text">${opt.t}</span>
    </button>`;
  });
  $optionsGrid.innerHTML = html;

  // Progress
  const pct = ((i + 1) / 24 * 100);
  $progressFill.style.width = pct + '%';
  $progressText.textContent = (i + 1) + ' / 24';

  // Nav buttons
  $btnBack.style.visibility = i === 0 ? 'hidden' : 'visible';
  const hasAnswer = state.answers[i] !== null;
  updateNextButton(hasAnswer);
}

function updateNextButton(enabled) {
  if (enabled) {
    $btnNext.classList.add('enabled');
  } else {
    $btnNext.classList.remove('enabled');
  }
}

// ==================== SELECT ANSWER ====================
function selectAnswer(letter) {
  const i = state.currentQ;
  state.answers[i] = letter;
  // Update option buttons
  const btns = $optionsGrid.querySelectorAll('.option-btn');
  btns.forEach(b => {
    b.classList.remove('selected');
    if (b.dataset.letter === letter) b.classList.add('selected');
  });
  updateNextButton(true);

  // Auto-advance after short delay (except last question)
  if (i < 23) {
    setTimeout(() => { nextQuestion(); }, 300);
  } else {
    // Last question: calculate result after selection
    setTimeout(() => { calculateAndShow(); }, 400);
  }
}

// ==================== NAVIGATION ====================
function nextQuestion() {
  if (state.currentQ < 23) {
    state.direction = 1;
    state.currentQ++;
    renderQuestion();
  }
}

function prevQuestion() {
  if (state.currentQ > 0) {
    state.direction = -1;
    state.currentQ--;
    renderQuestion();
  }
}

// Keyboard support
document.addEventListener('keydown', e => {
  if (state.page !== 'quiz') return;
  const keys = { '1': 'A', '2': 'B', '3': 'C', '4': 'D' };
  const letter = keys[e.key];
  if (letter) selectAnswer(letter);
  if (e.key === 'ArrowRight' && state.answers[state.currentQ] !== null) nextQuestion();
  if (e.key === 'ArrowLeft') prevQuestion();
});

// ==================== SCORING ====================
function calculateResult() {
  const ans = state.answers;
  // Step 1: Raw counts
  let externalRaw = 0, internalRaw = 0;
  let m1Act = 0, m1Adp = 0;
  let m2Act = 0, m2Adp = 0;
  let m3Act = 0, m3Adp = 0;
  let m4Act = 0, m4Adp = 0;

  for (let i = 0; i < 24; i++) {
    const ch = ans[i];
    // External/Internal
    if (ch === 'A' || ch === 'C') externalRaw++;
    else internalRaw++; // B or D

    // Active/Adaptive per module
    const isAct = (ch === 'A' || ch === 'B');
    if (i < 6) { if (isAct) m1Act++; else m1Adp++; }
    else if (i < 12) { if (isAct) m2Act++; else m2Adp++; }
    else if (i < 18) { if (isAct) m3Act++; else m3Adp++; }
    else { if (isAct) m4Act++; else m4Adp++; }
  }

  // Step 2: Weighted scores
  const activeScore = m2Act * 3 + m1Act + m3Act + m4Act;
  const adaptiveScore = m2Adp * 3 + m1Adp + m3Adp + m4Adp;

  // Step 3: Quadrant
  const extRatio = externalRaw / 24;
  const actRatio = activeScore / 36;

  let candidates;
  if (extRatio >= 0.5 && actRatio >= 0.5) candidates = ['A1','C1'];
  else if (extRatio < 0.5 && actRatio >= 0.5) candidates = ['A2','D2'];
  else if (extRatio >= 0.5 && actRatio < 0.5) candidates = ['B1','D1'];
  else candidates = ['B2','C2'];

  // Step 4: Q24 routing + signature matching
  const q24 = ans[23];
  const q24Candidates = Q24_ROUTING[q24] || candidates;
  // Intersection of quadrant candidates and Q24 candidates
  let finalCandidates = candidates.filter(c => q24Candidates.includes(c));
  if (finalCandidates.length === 0) finalCandidates = candidates;
  let modeKey;
  if (finalCandidates.length === 1) {
    modeKey = finalCandidates[0];
  } else {
    // Signature matching
    let bestKey = finalCandidates[0], bestScore = -Infinity;
    for (const key of finalCandidates) {
      let score = 0;
      const sigs = SIGNATURES[key] || [];
      for (const s of sigs) {
        if (ans[s.q] === s.exp) score += s.w;
      }
      if (score > bestScore) { bestScore = score; bestKey = key; }
    }
    modeKey = bestKey;
  }

  // Step 5: Dashboard
  const mode = MODES[modeKey];
  const driveScore = Math.round(Math.max(externalRaw, internalRaw) / 24 * 100);
  const stressBase = Math.round((6 - m2Act) / 6 * 100); // more adaptive in stress = higher stress
  const relationScore = Math.round((ans.filter((a,i) => i>=12 && i<18 && (a==='A'||a==='C')).length / 6) * 100);
  const meaningScore = Math.round((ans.filter((a,i) => i>=18 && (a==='B'||a==='D')).length / 6) * 100);

  // Blend with mode preset
  const dashboard = {
    drive: Math.round(mode.dashboard.drive * 0.7 + driveScore * 0.3),
    stress: Math.round(mode.dashboard.stress * 0.7 + stressBase * 0.3),
    relation: Math.round(mode.dashboard.relation * 0.7 + relationScore * 0.3),
    meaning: Math.round(mode.dashboard.meaning * 0.7 + meaningScore * 0.3)
  };

  return { modeKey, mode, dashboard, scores: { externalRaw, internalRaw, activeScore, adaptiveScore, extRatio, actRatio } };
}

function calculateAndShow() {
  state.result = calculateResult();
  navigateTo('result');
  setParticleTheme('result');
  renderResult();
  // Dashboard animation triggers on next frame
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      animateGauges(state.result.dashboard);
    });
  });
}

// ==================== RENDER RESULT ====================
function renderResult() {
  const { mode, dashboard } = state.result;

  // Compact view
  $resultCompact.innerHTML = `
    <div class="mode-emoji">${mode.emoji}</div>
    <h2 class="mode-name">${mode.name}<br><span class="mode-name-en">${mode.nameEn}</span></h2>
    <p class="mode-tagline">${mode.tagline}</p>
    <div class="dashboard">
      ${renderGauge('动力值', dashboard.drive, 'var(--accent-gold)')}
      ${renderGauge('压力值', dashboard.stress, 'var(--accent-coral)')}
      ${renderGauge('关系值', dashboard.relation, 'var(--accent-cyan)')}
      ${renderGauge('意义值', dashboard.meaning, 'var(--accent-green)')}
    </div>
    <div class="contradiction-card">
      <h4>⚡ 当前阶段核心矛盾</h4>
      <p>${mode.contradiction}</p>
    </div>
    <button class="btn-expand" id="btnExpand" onclick="toggleReport()">查看完整报告 ↓</button>
  `;

  // Full report
  let spHtml = mode.superpowers.map(s => `
    <div class="superpower-item">
      <h4><span class="power-icon">${s.icon}</span>${s.title}</h4>
      <p>${s.desc}</p>
      <p class="highlight">▸ ${s.scene}</p>
    </div>`).join('');

  let trHtml = mode.traps.map(t => `
    <div class="trap-item">
      <h4><span class="trap-icon">${t.icon}</span>${t.title}</h4>
      <p>${t.signal}</p>
      <p>${t.consequence}</p>
      <span class="signal-tag">⚠ ${t.warning}</span>
    </div>`).join('');

  let stHtml = mode.strategies.map(s => `
    <div class="strategy-item">
      <h4><span class="strategy-icon">${s.icon}</span>${s.title}</h4>
      <p>${s.content}</p>
      <span class="action-tag">📌 ${s.action}</span>
    </div>`).join('');

  let relHtml = `<table class="relation-table"><tr><th>与你互动的模式</th><th>可能的摩擦</th><th>协作建议</th></tr>
    ${mode.relationships.map(r => `<tr><td>${r.mode}</td><td>${r.friction}</td><td>${r.advice}</td></tr>`).join('')}
    </table>`;

  $resultFull.innerHTML = `
    <div class="report-section"><h3>📋 模式画像</h3><p>${mode.profile}</p></div>
    <div class="report-section"><h3>💎 你的职场超能力</h3>${spHtml}</div>
    <div class="report-section"><h3>⚠ 你的职场陷阱</h3>${trHtml}</div>
    <div class="report-section"><h3>🧭 生存策略</h3>${stHtml}</div>
    <div class="report-section"><h3>🤝 你与其他模式的相处指南</h3>${relHtml}</div>
    <div class="report-section"><h3>🔋 能量管理建议</h3><p>${mode.energyTip || '定期回顾你的能量仪表盘，关注四维平衡。'}</p></div>
  `;
}

function renderGauge(label, value, color) {
  const r = 26, circ = 2 * Math.PI * r;
  return `<div class="gauge">
    <div class="gauge-ring">
      <svg viewBox="0 0 64 64"><circle class="gauge-bg" cx="32" cy="32" r="${r}"/><circle class="gauge-fill" cx="32" cy="32" r="${r}" stroke="${color}" stroke-dasharray="${circ}" style="stroke-dashoffset:${circ}" data-target="${value}"/></svg>
      <span class="gauge-value" id="gaugeVal_${label}">0%</span>
    </div>
    <span class="gauge-label">${label}</span>
  </div>`;
}

function animateGauges(dashboard) {
  const fills = document.querySelectorAll('.gauge-fill');
  const r = 26, circ = 2 * Math.PI * r;
  const keys = ['drive','stress','relation','meaning'];
  const labels = ['动力值','压力值','关系值','意义值'];
  fills.forEach((fill, i) => {
    const target = dashboard[keys[i]];
    const offset = circ - (target / 100) * circ;
    fill.style.strokeDashoffset = offset;
    // Count-up number animation
    const valEl = document.getElementById('gaugeVal_' + labels[i]);
    if (valEl) {
      const startVal = 0;
      const duration = 1200;
      const startTime = performance.now();
      function countUp(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3); // ease-out cubic
        valEl.textContent = Math.round(startVal + (target - startVal) * eased) + '%';
        if (progress < 1) requestAnimationFrame(countUp);
      }
      requestAnimationFrame(countUp);
    }
  });
}

function toggleReport() {
  const full = $resultFull;
  const btn = document.getElementById('btnExpand');
  if (full.classList.contains('expanded')) {
    full.classList.remove('expanded');
    full.classList.add('collapsed');
    btn.textContent = '查看完整报告 ↓';
  } else {
    full.classList.remove('collapsed');
    full.classList.add('expanded');
    btn.textContent = '收起完整报告 ↑';
    setTimeout(() => { full.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 100);
  }
  state.reportExpanded = !state.reportExpanded;
}

// ==================== RESET ====================
function resetQuiz() {
  state.currentQ = 0;
  state.answers = new Array(24).fill(null);
  state.result = null;
  state.reportExpanded = false;
  $resultFull.classList.remove('expanded');
  $resultFull.classList.add('collapsed');
  // Reset screen animation
  const compass = document.getElementById('screenCompass');
  const inner = document.getElementById('screenInner');
  if (compass) { compass.classList.remove('spinning','converging'); }
  if (inner) { inner.classList.remove('burst'); }
  navigateTo('start');
  setParticleTheme('start');
}

// ==================== SAVE ====================
function saveResult() {
  if (!state.result) return;
  // Use print as save mechanism
  window.print();
}

// ==================== BOOT ====================
window.addEventListener('DOMContentLoaded', init);
</script>

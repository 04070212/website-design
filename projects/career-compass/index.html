<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="light">
<meta name="theme-color" content="#ffffff">
<meta name="description" content="职场能量罗盘 - 发现你的职场生存模式。24道题，8分钟，找到你在职场中的核心矛盾与应对策略。">
<meta property="og:title" content="职场能量罗盘 - 发现你的职场生存模式">
<meta property="og:description" content="24道题测出你的职场生存模式，获得专属行动指南。">
<meta property="og:type" content="website">
<title>职场能量罗盘</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ===== RESET ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
  background:#fff;
}
button{font-family:inherit;border:none;cursor:pointer;background:none;color:inherit;-webkit-appearance:none;appearance:none}
a{color:inherit;text-decoration:none}

/* ===== ACCENT ===== */
:root{--accent:#5E0ED7}

/* ===== ANIMATED BG ===== */
.bg-orb{
  position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0;
  opacity:.5;will-change:transform;
}
.bg-orb-1{
  width:60vw;height:60vw;top:-20%;left:-15%;
  background:rgba(94,14,215,.06);
  animation:orbDrift 20s ease-in-out infinite;
}
.bg-orb-2{
  width:50vw;height:50vw;bottom:-25%;right:-10%;
  background:rgba(94,14,215,.04);
  animation:orbDrift 24s ease-in-out infinite reverse;
}
.bg-orb-3{
  width:40vw;height:40vw;top:40%;left:50%;
  background:rgba(0,0,0,.03);
  animation:orbDrift 18s ease-in-out infinite;
}
@keyframes orbDrift{
  0%,100%{transform:translate(0,0)}
  25%{transform:translate(60px,-40px)}
  50%{transform:translate(-30px,50px)}
  75%{transform:translate(-50px,-20px)}
}

/* ===== APP ===== */
#app{
  position:relative;z-index:2;height:100%;width:100%;max-width:100%;
  display:flex;flex-direction:column;min-height:100vh;
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
}

/* ===== PAGE SYSTEM ===== */
.page{
  position:absolute;inset:0;display:flex;flex-direction:column;
  opacity:0;pointer-events:none;
  transition:opacity .5s cubic-bezier(.22,1,.36,1);
  overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.page.active{opacity:1;pointer-events:auto}
.page>*{flex-shrink:0}

/* ===== NAV ===== */
.nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 20px 0;
  flex-shrink:0;z-index:10;
}
@media(min-width:640px){.nav{padding:24px 32px 0}}
@media(min-width:768px){.nav{padding:24px 48px 0}}

.nav-logo{
  width:32px;height:32px;border-radius:50%;
  border:2px solid var(--accent);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;cursor:pointer;
  animation:fadeDown .5s cubic-bezier(.22,1,.36,1) both;
}
.nav-logo::after{
  content:'';width:10px;height:10px;border-radius:50%;background:var(--accent);
}

.nav-links{
  display:none;align-items:center;gap:32px;
}
@media(min-width:768px){.nav-links{display:flex}}
.nav-link{
  font-size:14px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:#000;
  transition:color .2s;cursor:pointer;
}
.nav-link:hover{color:var(--accent)}
.nav-link:nth-child(1){animation:fadeDown .5s .1s cubic-bezier(.22,1,.36,1) both}
.nav-link:nth-child(2){animation:fadeDown .5s .2s cubic-bezier(.22,1,.36,1) both}
.nav-link:nth-child(3){animation:fadeDown .5s .3s cubic-bezier(.22,1,.36,1) both}
.nav-link:nth-child(4){animation:fadeDown .5s .4s cubic-bezier(.22,1,.36,1) both}

.hamburger{
  width:36px;height:36px;border-radius:50%;background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  flex-shrink:0;cursor:pointer;
  animation:fadeDown .5s .5s cubic-bezier(.22,1,.36,1) both;
}
.hamburger span{display:block;width:16px;height:2px;background:#fff;border-radius:1px}

/* ===== MOBILE MENU ===== */
.mobile-menu{
  position:fixed;inset:0;z-index:50;background:#fff;
  display:flex;flex-direction:column;
  opacity:0;pointer-events:none;
  transition:opacity .35s cubic-bezier(.22,1,.36,1);
}
.mobile-menu.open{opacity:1;pointer-events:auto}
.mobile-menu .nav{width:100%}
.mobile-menu-links{
  display:flex;flex-direction:column;gap:32px;padding:64px 20px 0;
}
.mobile-menu-links a{
  font-size:28px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:#000;
}
.mobile-menu-cta{
  margin-top:auto;padding:20px 20px 40px;
  font-size:20px;font-weight:600;color:var(--accent);
  display:flex;align-items:center;gap:8px;
}
.close-btn{
  width:36px;height:36px;border-radius:50%;background:#000;color:#fff;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;cursor:pointer;
}

/* ===== MODE CARDS RING ===== */
.mode-cards-wrap{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:20px;overflow:visible;z-index:1;
}
.mode-cards-ring{
  position:relative;
  width:min(60vw,50vh,380px);height:min(60vw,50vh,380px);
  animation:ringRotate 30s linear infinite;
  flex-shrink:0;
}
.mode-cards-ring.paused{animation-play-state:paused}
@keyframes ringRotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

.mode-card{
  position:absolute;
  top:50%;left:50%;
  width:clamp(100px,18vw,140px);
  background:rgba(255,255,255,.75);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border-radius:14px;padding:12px 8px 10px;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  cursor:pointer;text-align:center;
  box-shadow:0 2px 20px rgba(0,0,0,.06);
  transition:transform .35s cubic-bezier(.22,1,.36,1),box-shadow .35s cubic-bezier(.22,1,.36,1),opacity .3s;
  transform-origin:center center;
}
.mode-card:nth-child(1){transform:translate(-50%,-50%) rotate(0deg) translateY(calc(min(28vw,24vh,160px) * -1)) rotate(0deg)}
.mode-card:nth-child(2){transform:translate(-50%,-50%) rotate(45deg) translateY(calc(min(28vw,24vh,160px) * -1)) rotate(-45deg)}
.mode-card:nth-child(3){transform:translate(-50%,-50%) rotate(90deg) translateY(calc(min(28vw,24vh,160px) * -1)) rotate(-90deg)}
.mode-card:nth-child(4){transform:translate(-50%,-50%) rotate(135deg) translateY(calc(min(28vw,24vh,160px) * -1)) rotate(-135deg)}
.mode-card:nth-child(5){transform:translate(-50%,-50%) rotate(180deg) translateY(calc(min(28vw,24vh,160px) * -1)) rotate(-180deg)}
.mode-card:nth-child(6){transform:translate(-50%,-50%) rotate(225deg) translateY(calc(min(28vw,24vh,160px) * -1)) rotate(-225deg)}
.mode-card:nth-child(7){transform:translate(-50%,-50%) rotate(270deg) translateY(calc(min(28vw,24vh,160px) * -1)) rotate(-270deg)}
.mode-card:nth-child(8){transform:translate(-50%,-50%) rotate(315deg) translateY(calc(min(28vw,24vh,160px) * -1)) rotate(-315deg)}

.mode-card:hover{
  box-shadow:0 8px 30px rgba(0,0,0,.12);
}
.mode-card.pulled{
  transform:translate(-50%,-50%) scale(1.25) !important;
  box-shadow:0 0 0 2px var(--accent),0 20px 60px rgba(94,14,215,.25);
  z-index:10;transition:transform .5s cubic-bezier(.22,1,.36,1),box-shadow .5s,opacity .3s;
}
.mode-card.dismiss{opacity:0;transform:translate(-50%,-50%) scale(.5) !important;pointer-events:none}

.mode-card-emoji{font-size:32px;line-height:1}
@media(min-width:640px){.mode-card-emoji{font-size:38px}}
.mode-card-name{
  font-size:13px;font-weight:700;color:#000;letter-spacing:.05em;
}
@media(min-width:640px){.mode-card-name{font-size:14px}}
.mode-card-en{
  font-size:8px;font-weight:500;color:rgba(0,0,0,.35);letter-spacing:.1em;text-transform:uppercase;
  margin-top:-2px;
}
.mode-card-tag{
  font-size:9px;color:rgba(0,0,0,.4);line-height:1.3;font-weight:500;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  max-width:100%;
}

/* ===== BOTTOM SECTION ===== */
.bottom{
  padding:40px 20px 32px;display:flex;flex-direction:column;gap:24px;flex-shrink:0;
  position:relative;z-index:2;background:linear-gradient(180deg,transparent 0%,rgba(255,255,255,.85) 40px,#fff 80px);
}
@media(min-width:640px){.bottom{padding:0 32px 40px}}
@media(min-width:768px){.bottom{padding:0 48px 48px;gap:48px}}

.bottom-row-a{
  display:flex;align-items:center;justify-content:space-between;gap:16px;
}
.tagline{
  font-size:10px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:#000;
  max-width:130px;line-height:1.5;
  animation:fadeUp .6s .6s cubic-bezier(.22,1,.36,1) both;
}
@media(min-width:640px){.tagline{font-size:12px;max-width:160px}}
@media(min-width:768px){.tagline{font-size:14px;max-width:320px}}

.cta-link{
  font-size:16px;font-weight:600;color:var(--accent);white-space:nowrap;
  display:flex;align-items:center;gap:6px;cursor:pointer;
  animation:fadeUp .6s .72s cubic-bezier(.22,1,.36,1) both;
  transition:opacity .2s;
}
.cta-link:hover{opacity:.7}
.cta-link svg{width:18px;height:18px}
@media(min-width:640px){.cta-link{font-size:20px}.cta-link svg{width:22px;height:22px}}
@media(min-width:768px){.cta-link{font-size:24px}}

.bottom-row-b{
  display:flex;align-items:flex-end;justify-content:space-between;gap:12px;
}
@media(min-width:640px){.bottom-row-b{gap:16px}}

.desc-block{
  width:120px;flex-shrink:0;
  animation:fadeUp .6s .84s cubic-bezier(.22,1,.36,1) both;
}
@media(min-width:640px){.desc-block{width:180px}}
@media(min-width:768px){.desc-block{width:280px}}
.desc-block p{
  font-size:9px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:#000;
  text-align:left;line-height:1.6;
}
@media(min-width:640px){.desc-block p{font-size:12px}}
@media(min-width:768px){.desc-block p{font-size:14px;text-align:right}}

.heading-block{text-align:right}
.heading-word{
  overflow:hidden;
}
.heading-word span{
  display:block;
  font-size:clamp(2rem,9vw,9rem);font-weight:600;text-transform:uppercase;color:#000;
  line-height:.88;
  animation:slideUp .7s cubic-bezier(.22,1,.36,1) both;
}
.heading-word:nth-child(1) span{animation-delay:.4s}
.heading-word:nth-child(2) span{animation-delay:.54s}
.heading-word:nth-child(3) span{animation-delay:.68s}

/* ===== ANIMATIONS ===== */
@keyframes fadeDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(110%)}to{transform:translateY(0)}}

/* ===== QUIZ PAGE ===== */
#page-quiz{justify-content:center;align-items:center}
.quiz-container{
  width:100%;max-width:560px;padding:0 20px;
  display:flex;flex-direction:column;gap:24px;
}
.quiz-progress-wrap{width:100%}
.quiz-progress-info{
  display:flex;justify-content:space-between;margin-bottom:10px;
  font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:#000;
}
.quiz-progress-track{
  width:100%;height:3px;background:rgba(0,0,0,.1);border-radius:2px;overflow:hidden;
}
.quiz-progress-fill{
  height:100%;background:var(--accent);border-radius:2px;transition:width .3s ease;
}
.quiz-card{
  background:rgba(255,255,255,.7);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-radius:20px;padding:28px 24px;
  box-shadow:0 4px 40px rgba(0,0,0,.06);
  animation:fadeUp .4s cubic-bezier(.22,1,.36,1);
}
.quiz-card.reverse{animation:fadeUp .4s cubic-bezier(.22,1,.36,1) reverse}
.quiz-q-num{
  font-size:13px;font-weight:600;color:var(--accent);margin-bottom:12px;letter-spacing:.1em;
}
.quiz-q-text{
  font-size:18px;font-weight:600;line-height:1.5;color:#000;margin-bottom:24px;
}
@media(min-width:640px){.quiz-q-text{font-size:20px}}
.quiz-options{display:flex;flex-direction:column;gap:10px}
.quiz-opt{
  display:flex;align-items:flex-start;gap:12px;width:100%;padding:14px 16px;
  border-radius:12px;background:rgba(0,0,0,.03);text-align:left;
  transition:all .2s ease;cursor:pointer;min-height:52px;
}
.quiz-opt:hover{background:rgba(94,14,215,.06)}
.quiz-opt.selected{background:rgba(94,14,215,.1);box-shadow:inset 0 0 0 1.5px var(--accent)}
.quiz-opt-letter{
  flex-shrink:0;width:28px;height:28px;border-radius:50%;
  background:rgba(0,0,0,.06);display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:600;color:rgba(0,0,0,.5);transition:all .2s;
}
.quiz-opt.selected .quiz-opt-letter{background:var(--accent);color:#fff}
.quiz-opt-text{font-size:14px;line-height:1.6;color:rgba(0,0,0,.7);font-weight:500}
.quiz-opt.selected .quiz-opt-text{color:#000}
.quiz-nav-row{
  display:flex;justify-content:space-between;width:100%;max-width:560px;padding:0 20px;gap:12px;
}
.quiz-nav-btn{
  padding:10px 20px;border-radius:50px;font-size:13px;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;transition:all .2s;
}
.quiz-nav-back{color:rgba(0,0,0,.5);background:rgba(0,0,0,.04)}
.quiz-nav-back:hover{color:#000;background:rgba(0,0,0,.08)}
.quiz-nav-next{color:#fff;background:var(--accent);opacity:.3;pointer-events:none}
.quiz-nav-next.enabled{opacity:1;pointer-events:auto}
.quiz-nav-next.enabled:hover{opacity:.85}

/* ===== RESULT PAGE ===== */
#page-result{align-items:center;padding-bottom:120px}
.result-container{
  width:100%;max-width:640px;padding:0 20px;
  display:flex;flex-direction:column;align-items:center;gap:32px;
}
@media(min-width:768px){.result-container{gap:48px}}

.result-stats{
  display:flex;gap:20px;justify-content:center;flex-wrap:wrap;width:100%;
  padding-top:24px;
}
@media(min-width:640px){.result-stats{gap:32px}}
@media(min-width:768px){.result-stats{gap:48px}}

.result-stat{
  text-align:center;
  animation:fadeUp .6s cubic-bezier(.22,1,.36,1) both;
}
.result-stat:nth-child(1){animation-delay:.2s}
.result-stat:nth-child(2){animation-delay:.32s}
.result-stat:nth-child(3){animation-delay:.44s}
.result-stat:nth-child(4){animation-delay:.56s}

.result-stat-num{
  font-size:clamp(2rem,6vw,3.5rem);font-weight:600;color:#000;line-height:.9;
}
.result-stat-num .plus{font-size:.5em;color:var(--accent);vertical-align:super}
.result-stat-label{
  font-size:10px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:#000;
  margin-top:4px;
}
@media(min-width:640px){.result-stat-label{font-size:12px}}

.result-heading{
  width:100%;text-align:center;
}
.result-emoji{
  font-size:48px;margin-bottom:12px;animation:fadeUp .5s .6s cubic-bezier(.22,1,.36,1) both;
}
.result-mode-name{
  overflow:hidden;margin-bottom:4px;
}
.result-mode-name span{
  display:block;
  font-size:clamp(2rem,8vw,6rem);font-weight:700;text-transform:uppercase;color:#000;line-height:1;
  animation:slideUp .7s .7s cubic-bezier(.22,1,.36,1) both;
}
.result-mode-en{
  font-size:13px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:rgba(0,0,0,.4);
  animation:fadeUp .5s .9s cubic-bezier(.22,1,.36,1) both;
}
.result-tagline{
  font-size:14px;font-weight:500;color:rgba(0,0,0,.6);line-height:1.6;text-align:center;
  max-width:400px;
  animation:fadeUp .5s 1s cubic-bezier(.22,1,.36,1) both;
}

.result-contradiction{
  width:100%;padding:20px;border-radius:16px;
  background:rgba(94,14,215,.05);text-align:center;
}
.result-contradiction h4{
  font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;
}
.result-contradiction p{
  font-size:15px;font-weight:600;color:#000;line-height:1.6;
}

.result-expand-btn{
  padding:12px 28px;border-radius:50px;
  font-size:13px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;
  color:var(--accent);background:rgba(94,14,215,.06);
  transition:all .2s;cursor:pointer;
}
.result-expand-btn:hover{background:rgba(94,14,215,.12)}

/* Full Report */
.result-full{
  width:100%;max-width:560px;max-height:0;opacity:0;overflow:hidden;
  transition:max-height .6s cubic-bezier(.22,1,.36,1),opacity .4s ease;
}
.result-full.expanded{max-height:20000px;opacity:1}
.report-section{
  margin-bottom:24px;padding:24px;border-radius:16px;
  background:rgba(255,255,255,.7);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  box-shadow:0 4px 30px rgba(0,0,0,.04);
}
.report-section h3{
  font-size:14px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:#000;margin-bottom:16px;
}
.report-section h4{font-size:14px;font-weight:600;margin-bottom:8px;color:#000}
.report-section p{font-size:13px;line-height:1.8;color:rgba(0,0,0,.7);font-weight:500}
.report-section .highlight{color:var(--accent);font-weight:600}
.superpower-item,.trap-item,.strategy-item{margin-bottom:16px}
.superpower-item:last-child,.trap-item:last-child,.strategy-item:last-child{margin-bottom:0}
.power-icon,.trap-icon,.strategy-icon{font-size:18px;margin-right:6px}
.signal-tag{
  display:inline-block;padding:4px 10px;border-radius:12px;font-size:11px;margin-top:6px;
  background:rgba(94,14,215,.08);color:var(--accent);font-weight:600;
}
.action-tag{
  display:inline-block;padding:6px 12px;border-radius:12px;font-size:12px;margin-top:8px;
  background:rgba(0,0,0,.05);color:#000;font-weight:600;
}
.relation-table{width:100%;border-collapse:collapse;margin-top:8px}
.relation-table th,.relation-table td{padding:10px 12px;font-size:12px;line-height:1.5;text-align:left;border-bottom:1px solid rgba(0,0,0,.06)}
.relation-table th{color:rgba(0,0,0,.4);font-weight:600;font-size:11px;letter-spacing:.1em;text-transform:uppercase}
.relation-table td{color:rgba(0,0,0,.7);font-weight:500}

/* Result Actions (fixed bottom) */
.result-actions{
  position:fixed;bottom:0;left:0;right:0;padding:16px 20px calc(16px + env(safe-area-inset-bottom,0px));
  background:linear-gradient(180deg,transparent,rgba(255,255,255,.9) 30%);
  display:flex;gap:12px;justify-content:center;z-index:10;
}
.result-actions button{
  padding:14px 28px;border-radius:50px;font-size:14px;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;cursor:pointer;transition:all .2s;
}
.btn-retake{color:rgba(0,0,0,.6);background:rgba(0,0,0,.05)}
.btn-retake:hover{background:rgba(0,0,0,.1)}
.btn-save{color:#fff;background:var(--accent)}
.btn-save:hover{opacity:.85}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.25)}

/* ===== UTILITY ===== */
.hidden-vis{visibility:hidden}
</style>
</head>
<body>

<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="bg-orb bg-orb-3"></div>

<div id="app">

  <!-- ========== START PAGE ========== -->
  <section id="page-start" class="page active">
    <nav class="nav">

// ==================== APP STATE ====================
const state = {
  page: 'start',
  currentQ: 0,
  answers: new Array(24).fill(null),
  direction: 1,
  result: null,
  reportExpanded: false
};

const $pages = {
  start: document.getElementById('page-start'),
  quiz: document.getElementById('page-quiz'),
  result: document.getElementById('page-result')
};
const $progressFill = document.getElementById('progressFill');
const $progressText = document.getElementById('progressText');
const $moduleLabel = document.getElementById('moduleLabel');
const $questionCard = document.getElementById('questionCard');
const $questionNumber = document.getElementById('questionNumber');
const $questionText = document.getElementById('questionText');
const $optionsGrid = document.getElementById('optionsGrid');
const $btnBack = document.getElementById('btnBack');
const $btnNext = document.getElementById('btnNext');

// ==================== NAVIGATION ====================
function navigateTo(page) {
  Object.keys($pages).forEach(k => $pages[k].classList.remove('active'));
  $pages[page].classList.add('active');
  state.page = page;
  if (page === 'result') {
    const full = document.getElementById('resultFull');
    if (full) { full.classList.remove('expanded'); full.classList.add('collapsed'); }
    state.reportExpanded = false;
  }
}

function toggleMenu() {
  document.getElementById('mobileMenu').classList.toggle('open');
}

// ==================== START / RESET ====================
function startQuiz() {
  document.getElementById('mobileMenu').classList.remove('open');
  state.currentQ = 0;
  state.answers = new Array(24).fill(null);
  state.direction = 1;
  navigateTo('quiz');
  renderQuestion();
}

function resetQuiz() {
  document.getElementById('mobileMenu').classList.remove('open');
  state.currentQ = 0;
  state.answers = new Array(24).fill(null);
  state.result = null;
  state.reportExpanded = false;
  const full = document.getElementById('resultFull');
  if (full) { full.classList.remove('expanded'); full.classList.add('collapsed'); }
  navigateTo('start');
}

// ==================== QUESTION RENDERING ====================
function renderQuestion() {
  const i = state.currentQ;
  const q = QUESTIONS[i];
  const animClass = state.direction > 0 ? '' : 'reverse';
  $questionCard.className = 'quiz-card ' + animClass;
  void $questionCard.offsetWidth;
  $questionCard.className = 'quiz-card ' + animClass;

  $questionNumber.textContent = 'Q' + q.id;
  $questionText.textContent = q.text;
  $moduleLabel.textContent = MODULE_NAMES[i];

  let html = '';
  q.options.forEach(opt => {
    const sel = state.answers[i] === opt.l ? ' selected' : '';
    html += '<button class="quiz-opt' + sel + '" data-letter="' + opt.l + '" onclick="selectAnswer(\'' + opt.l + '\')">'
      + '<span class="quiz-opt-letter">' + opt.l + '</span>'
      + '<span class="quiz-opt-text">' + opt.t + '</span></button>';
  });
  $optionsGrid.innerHTML = html;

  const pct = ((i + 1) / 24 * 100);
  $progressFill.style.width = pct + '%';
  $progressText.textContent = (i + 1) + ' / 24';

  $btnBack.style.visibility = i === 0 ? 'hidden' : 'visible';
  updateNextButton(state.answers[i] !== null);
}

function updateNextButton(enabled) {
  if (enabled) { $btnNext.classList.add('enabled'); }
  else { $btnNext.classList.remove('enabled'); }
}

// ==================== ANSWER SELECTION ====================
function selectAnswer(letter) {
  const i = state.currentQ;
  state.answers[i] = letter;
  const btns = $optionsGrid.querySelectorAll('.quiz-opt');
  btns.forEach(b => {
    b.classList.remove('selected');
    if (b.dataset.letter === letter) b.classList.add('selected');
  });
  updateNextButton(true);
  if (i < 23) { setTimeout(() => { nextQuestion(); }, 300); }
  else { setTimeout(() => { calculateAndShow(); }, 400); }
}

function nextQuestion() {
  if (state.currentQ < 23) { state.direction = 1; state.currentQ++; renderQuestion(); }
}
function prevQuestion() {
  if (state.currentQ > 0) { state.direction = -1; state.currentQ--; renderQuestion(); }
}

// Keyboard support
document.addEventListener('keydown', e => {
  if (state.page !== 'quiz') return;
  const keys = { '1': 'A', '2': 'B', '3': 'C', '4': 'D' };
  const letter = keys[e.key];
  if (letter) selectAnswer(letter);
  if (e.key === 'ArrowRight' && state.answers[state.currentQ] !== null) nextQuestion();
  if (e.key === 'ArrowLeft') prevQuestion();
});

// ==================== SCORING ====================
function calculateResult() {
  const ans = state.answers;
  let externalRaw = 0, internalRaw = 0;
  let m1Act = 0, m1Adp = 0, m2Act = 0, m2Adp = 0, m3Act = 0, m3Adp = 0, m4Act = 0, m4Adp = 0;
  for (let i = 0; i < 24; i++) {
    const ch = ans[i];
    if (ch === 'A' || ch === 'C') externalRaw++; else internalRaw++;
    const isAct = (ch === 'A' || ch === 'B');
    if (i < 6) { if (isAct) m1Act++; else m1Adp++; }
    else if (i < 12) { if (isAct) m2Act++; else m2Adp++; }
    else if (i < 18) { if (isAct) m3Act++; else m3Adp++; }
    else { if (isAct) m4Act++; else m4Adp++; }
  }
  const activeScore = m2Act * 3 + m1Act + m3Act + m4Act;
  const adaptiveScore = m2Adp * 3 + m1Adp + m3Adp + m4Adp;
  const extRatio = externalRaw / 24;
  const actRatio = activeScore / 36;

  let candidates;
  if (extRatio >= 0.5 && actRatio >= 0.5) candidates = ['A1','C1'];
  else if (extRatio < 0.5 && actRatio >= 0.5) candidates = ['A2','D2'];
  else if (extRatio >= 0.5 && actRatio < 0.5) candidates = ['B1','D1'];
  else candidates = ['B2','C2'];

  const q24 = ans[23];
  const q24Candidates = Q24_ROUTING[q24] || candidates;
  let finalCandidates = candidates.filter(c => q24Candidates.includes(c));
  if (finalCandidates.length === 0) finalCandidates = candidates;

  let modeKey;
  if (finalCandidates.length === 1) {
    modeKey = finalCandidates[0];
  } else {
    let bestKey = finalCandidates[0], bestScore = -Infinity;
    for (const key of finalCandidates) {
      let score = 0;
      const sigs = SIGNATURES[key] || [];
      for (const s of sigs) { if (ans[s.q] === s.exp) score += s.w; }
      if (score > bestScore) { bestScore = score; bestKey = key; }
    }
    modeKey = bestKey;
  }

  const mode = MODES[modeKey];
  const driveScore = Math.round(Math.max(externalRaw, internalRaw) / 24 * 100);
  const stressBase = Math.round((6 - m2Act) / 6 * 100);
  const relationScore = Math.round((ans.filter((a,i) => i>=12 && i<18 && (a==='A'||a==='C')).length / 6) * 100);
  const meaningScore = Math.round((ans.filter((a,i) => i>=18 && (a==='B'||a==='D')).length / 6) * 100);

  const dashboard = {
    drive: Math.round(mode.dashboard.drive * 0.7 + driveScore * 0.3),
    stress: Math.round(mode.dashboard.stress * 0.7 + stressBase * 0.3),
    relation: Math.round(mode.dashboard.relation * 0.7 + relationScore * 0.3),
    meaning: Math.round(mode.dashboard.meaning * 0.7 + meaningScore * 0.3)
  };
  return { modeKey, mode, dashboard };
}

function calculateAndShow() {
  state.result = calculateResult();
  navigateTo('result');
  renderResult();
  requestAnimationFrame(() => {
    requestAnimationFrame(() => { animateStats(state.result); });
  });
}

function animateStats(result) {
  const keys = ['drive','stress','relation','meaning'];
  const ids = ['gaugeDrive','gaugeStress','gaugeRelation','gaugeMeaning'];
  keys.forEach((k, i) => {
    const el = document.getElementById(ids[i]);
    if (!el) return;
    const target = result.dashboard[k];
    const duration = 1200;
    const startTime = performance.now();
    function countUp(now) {
      const elapsed = now - startTime;
      const progress = Math.min(elapsed / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      el.textContent = Math.round(target * eased);
      if (progress < 1) requestAnimationFrame(countUp);
    }
    requestAnimationFrame(countUp);
  });
}

function toggleReport() {
  const full = document.getElementById('resultFull');
  const btn = document.getElementById('btnExpand');
  if (full.classList.contains('expanded')) {
    full.classList.remove('expanded'); full.classList.add('collapsed');
    btn.textContent = '查看完整报告 ↓';
  } else {
    full.classList.remove('collapsed'); full.classList.add('expanded');
    btn.textContent = '收起完整报告 ↑';
    setTimeout(() => { full.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 100);
  }
  state.reportExpanded = !state.reportExpanded;
}

function saveResult() {
  if (!state.result) return;
  window.print();
}

// ==================== MODE CARDS RING ====================
function renderModeCards() {
  const ring = document.getElementById('modeCardsRing');
  if (!ring) return;
  const modes = Object.values(MODES);
  ring.innerHTML = modes.map(m =>
    '<div class="mode-card" data-key="' + m.key + '" onclick="pullCard(this)">'
    + '<div class="mode-card-emoji">' + m.emoji + '</div>'
    + '<div class="mode-card-name">' + m.name + '</div>'
    + '<div class="mode-card-en">' + m.nameEn + '</div>'
    + '<div class="mode-card-tag">' + m.tagline + '</div>'
    + '</div>'
  ).join('');

  // Pause ring on hover
  ring.addEventListener('mouseenter', () => ring.classList.add('paused'));
  ring.addEventListener('mouseleave', () => ring.classList.remove('paused'));
}

function pullCard(card) {
  const ring = document.getElementById('modeCardsRing');
  ring.classList.add('paused');
  card.classList.add('pulled');
  setTimeout(() => {
    const all = document.querySelectorAll('.mode-card');
    all.forEach(c => { if (c !== card) c.classList.add('dismiss'); });
  }, 250);
  setTimeout(() => { startQuiz(); }, 700);
}

// ==================== BOOT ====================
window.addEventListener('DOMContentLoaded', () => {
  renderModeCards();
  navigateTo('start');
});
</script>
